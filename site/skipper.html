<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Edoardo Casella — Skipper · Plancia Niña</title>
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0A1424">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans+Condensed:wght@600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBFDFF; --sea-1:#EEF4F9; --sea-2:#D8E4EE; --panel:#FFFFFF;
  --ink:#0B1320; --soft:#3E556B; --hair:#C4D2DF; --accent:#006B9F;
  --gold:#B8860B; --gold-2:#E5C158; --verde:#0A7A43; --rosso:#C0392B;
  --display:"IBM Plex Sans Condensed",system-ui,sans-serif;
  --body:"IBM Plex Sans",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
@media (prefers-color-scheme: dark){:root{
  --paper:#070E1A; --sea-1:#101E33; --sea-2:#1C3552; --panel:#0C1728;
  --ink:#DCE7F5; --soft:#8299B4; --hair:#22384F; --accent:#35C4E7;
  --gold:#E5C158; --gold-2:#FBE7A8; --rosso:#E2536F;
}}
*{box-sizing:border-box;margin:0}
body{background:var(--paper);color:var(--ink);font:400 16px/1.55 var(--body);-webkit-font-smoothing:antialiased}
main{max-width:720px;margin:0 auto;border-left:1px solid var(--hair);border-right:1px solid var(--hair)}
.wrap{max-width:700px;margin:0 auto}
.water{font-style:italic}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
a{color:var(--accent)}
.flag{width:24px;height:16px;border-radius:2px;object-fit:cover;
  box-shadow:0 0 0 1px rgba(0,0,0,.2), 0 1px 2px rgba(0,0,0,.25);vertical-align:-2px}

.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--hair)}
.top .wrap{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.1rem}
.back{font:700 .66rem/1 var(--display);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--soft)}
.top .tag{font:700 .66rem/1 var(--display);letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}

/* HERO / dossier */
.hero{position:relative;min-height:420px;overflow:hidden;background:#0A1424}
.hero>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero .grad{position:absolute;inset:0;background:linear-gradient(to top,
  rgba(4,9,18,.95) 6%, rgba(4,9,18,.55) 45%, rgba(4,9,18,.15) 100%)}
.hero .cap{position:relative;padding:2.4rem 1.2rem 1.5rem;color:#fff}
.rankline{display:flex;align-items:center;gap:.7rem;margin-bottom:.7rem}
.medal{width:58px;height:58px;flex:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.rankttl{font:700 .72rem/1.15 var(--display);letter-spacing:.2em;text-transform:uppercase;color:var(--gold-2)}
.rankttl b{display:block;font-size:1.05rem;letter-spacing:.14em;color:#fff;margin-top:.15rem}
.stars{color:var(--gold-2);letter-spacing:.15em;font-size:.95rem;margin-top:.15rem}
.hero h1{font:700 clamp(1.9rem,7vw,2.7rem)/1.05 var(--display);letter-spacing:.01em;color:#fff;margin-top:.2rem;overflow-wrap:break-word}
/* foto identificativa stile dossier anni '40 (stampa seppia spillata) */
.idphoto{position:absolute;top:.9rem;right:.9rem;z-index:4;width:152px;margin:0;
  padding:6px 6px 20px;background:#efe6d0;border:1px solid rgba(0,0,0,.25);border-radius:2px;
  box-shadow:0 8px 22px rgba(0,0,0,.55);transform:rotate(3deg)}
.idphoto::before{content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(-4deg);
  width:34px;height:16px;background:rgba(210,225,235,.5);border:1px solid rgba(255,255,255,.4);border-radius:1px}
.idphoto img{width:100%;display:block;filter:contrast(1.03)}
.idphoto figcaption{position:absolute;left:0;right:0;bottom:4px;text-align:center;
  font:400 .74rem/1 var(--body);font-style:italic;color:#6b573096}
/* mobile: la foto identificativa diventa un float dentro il blocco testo, il
   nome le scorre attorno e riprende a piena larghezza sotto (niente piu' nome
   tagliato dietro la foto) */
@media(max-width:520px){
  .idphoto{position:relative;top:auto;right:auto;float:right;width:122px;
    margin:.2rem 0 .5rem .8rem;transform:rotate(2deg)}
  .hero .cap{padding-top:1.9rem}
  .ribbons{clear:right}
}
@media(max-width:360px){.idphoto{width:104px}}
.hero .sub{margin-top:.5rem;font-size:1rem;color:#e6eef6}
.ribbons{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:1rem}
.ribbons .flag{width:30px;height:20px}

/* progress */
.xp{padding:1.2rem 1.1rem;background:var(--panel);border-bottom:1px solid var(--hair)}
.xp .row{display:flex;justify-content:space-between;align-items:baseline;gap:.6rem;font:700 .64rem/1.2 var(--display);
  letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:.5rem}
.xp .row b{color:var(--gold);font-family:var(--mono);letter-spacing:0}
.xp .row span:last-child{text-align:right}
.bar{height:10px;background:var(--sea-2);border-radius:6px;overflow:hidden;border:1px solid var(--hair)}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2));border-radius:6px;
  transition:width 1.1s cubic-bezier(.2,.7,.2,1)}
.xp .nextcap{margin-top:.5rem;font:700 .6rem/1.3 var(--display);letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}

/* SERVICE RECORD stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(84px,1fr));gap:1px;background:var(--hair);border-bottom:1px solid var(--hair)}
.stat{background:var(--panel);padding:1.1rem .5rem;text-align:center}
.stat b{display:block;font:700 1.75rem/1 var(--mono);font-variant-numeric:tabular-nums;color:var(--ink)}
.stat i{display:block;font:700 .55rem/1.3 var(--display);letter-spacing:.13em;text-transform:uppercase;color:var(--soft);font-style:normal;margin-top:.45rem}

section{padding:1.7rem 1.1rem}
h2{font:700 .74rem/1 var(--display);letter-spacing:.2em;text-transform:uppercase;color:var(--soft);
  margin-bottom:1rem;display:flex;align-items:center;gap:.55rem;border-left:3px solid var(--gold);padding-left:.55rem}
h2::after{content:"";flex:1;height:1px;background:var(--hair)}
.lead{font-size:1.05rem;line-height:1.7}.lead b{color:var(--ink)}

/* TEATRI operativi */
.theatres{display:grid;grid-template-columns:1fr;gap:.5rem}
@media(min-width:560px){.theatres{grid-template-columns:1fr 1fr}}
.th{display:flex;align-items:center;gap:.6rem;background:var(--panel);border:1px solid var(--hair);
  border-left:3px solid var(--gold);border-radius:4px;padding:.6rem .7rem}
.th .flag{width:34px;height:23px;flex:none}
.th .n{flex:1;min-width:0}
.th .n b{display:block;font-size:.92rem;font-weight:600}
.th .n span{font:600 .62rem/1.3 var(--display);letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
.th .mi{font:700 .95rem/1 var(--mono);color:var(--gold)}

/* DECORAZIONI */
.medals{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:.7rem}
.dec{text-align:center}
.dec .disc{width:60px;height:60px;margin:0 auto .4rem;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.7rem;background:radial-gradient(circle at 50% 38%, #FBE7A8, #E5C158 55%, #9A741A);
  box-shadow:0 2px 8px rgba(0,0,0,.35), inset 0 0 0 2px rgba(255,255,255,.35);color:#3a2c05}
.dec b{display:block;font:700 .62rem/1.2 var(--display);letter-spacing:.06em;text-transform:uppercase}
.dec span{font-size:.66rem;color:var(--soft)}
a.dec{text-decoration:none;color:inherit}
.dec.ph .disc{background:radial-gradient(circle at 50% 38%, #E6C6F5, #8E44AD 55%, #5B2C82);color:#fff;box-shadow:0 2px 8px rgba(70,20,110,.4), inset 0 0 0 2px rgba(255,255,255,.3)}
.dec.ph b{color:#a05bd0}
.incident.gold{border-left-color:var(--gold)}
.incident.gold .stamp{border-color:var(--gold);color:var(--gold)}
.incident.gold .les b,.incident.gold .esito b{color:var(--gold)}

/* droni a bordo */
.drones{display:grid;gap:.7rem}
.drone{background:var(--panel);border:1px solid var(--hair);border-left:3px solid var(--accent);border-radius:4px;padding:.9rem 1rem}
.drone .dhead{display:flex;align-items:baseline;justify-content:space-between;gap:.5rem;margin-bottom:.7rem;flex-wrap:wrap}
.drone .dhead b{font:700 1.12rem/1.1 var(--body)}
.drone .drole{font:700 .56rem/1 var(--display);letter-spacing:.1em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);padding:.24rem .45rem;border-radius:3px}
.dspec{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:.4rem .9rem}
@media(max-width:520px){.dspec{grid-template-columns:1fr}}
.dspec li{display:flex;justify-content:space-between;gap:.6rem;align-items:baseline;font-size:.82rem;border-bottom:1px solid var(--hair);padding-bottom:.35rem}
.dspec li span{color:var(--soft);font:700 .56rem/1.3 var(--display);letter-spacing:.06em;text-transform:uppercase;flex:none}
.dspec li b{font-family:var(--mono);font-size:.8rem;text-align:right}
.drone .video{position:relative;margin-top:.7rem;aspect-ratio:16/9;border-radius:4px;overflow:hidden;background:#000}
.drone .video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

/* galleria */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem}
@media(max-width:520px){.grid{grid-template-columns:repeat(2,1fr)}}
.grid button{padding:0;border:0;background:var(--sea-2);border-radius:4px;overflow:hidden;aspect-ratio:1;cursor:pointer}
.grid img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.grid button:hover img{transform:scale(1.06)}

/* lightbox */
.lb{position:fixed;inset:0;z-index:60;background:rgba(3,8,16,.94);display:none;align-items:center;justify-content:center;touch-action:pan-y}
.lb.on{display:flex}
.lb img{max-width:96vw;max-height:82vh;object-fit:contain;border-radius:4px;box-shadow:0 10px 60px rgba(0,0,0,.6)}
.lb .x{position:absolute;top:.8rem;right:1rem;width:2.6rem;height:2.6rem;border:0;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;font-size:1.3rem;cursor:pointer}
.lb .nav{position:absolute;top:50%;transform:translateY(-50%);width:3rem;height:3rem;border:0;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;font-size:1.5rem;cursor:pointer}
.lb .prev{left:.6rem}.lb .next{right:.6rem}
.lb .count{position:absolute;bottom:1.1rem;color:#cfe3f2;font:600 .8rem/1 var(--mono);letter-spacing:.1em}

/* crociere */
.year{margin-top:1.2rem}.year:first-child{margin-top:0}
.year h3{font:700 1.3rem/1 var(--mono);color:var(--gold);margin-bottom:.5rem}
.trip{display:flex;gap:.7rem;align-items:center;padding:.55rem 0;border-bottom:1px solid var(--hair)}
.trip:last-child{border-bottom:0}
.trip .fl{flex:none;display:flex;gap:2px}
.trip .pl{flex:1;min-width:0}.trip .pl b{font-weight:600}
.trip .pl .bl{display:block;font-size:.8rem;color:var(--soft)}
.trip .mi{flex:none;min-width:3.2rem;font:700 1.15rem/1 var(--mono);color:var(--accent);text-align:right}
.trip .mi em{display:block;font:400 .58rem/1.3 var(--display);color:var(--soft);font-style:normal;letter-spacing:.08em;text-transform:uppercase;margin-top:.25rem}
.bti{display:inline-flex;vertical-align:-3px}
.bt{width:16px;height:16px;color:var(--gold);flex:none}
.tags{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center;margin-top:.35rem}
.pace{display:inline-block;font:700 .56rem/1 var(--display);letter-spacing:.11em;text-transform:uppercase;
  padding:.26rem .5rem;border-radius:3px}
.pace.chill{background:color-mix(in srgb,var(--verde) 20%,transparent);color:var(--verde)}
.pace.cruise{background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--accent)}
.pace.push{background:color-mix(in srgb,var(--gold) 24%,transparent);color:var(--gold)}
.pace.extreme{background:color-mix(in srgb,#e2536f 22%,transparent);color:#e2536f}
.diff{display:inline-block;font:700 .56rem/1 var(--display);letter-spacing:.1em;text-transform:uppercase;
  padding:.24rem .48rem;border-radius:3px;border:1px solid currentColor;cursor:help}
.diff.beg{color:var(--verde)} .diff.int{color:var(--accent)} .diff.adv{color:var(--gold)} .diff.exp{color:var(--rosso)}
.dec{cursor:help}
.paceleg{display:flex;flex-wrap:wrap;align-items:center;gap:.4rem;margin-bottom:1.2rem}
.paceleg em{font-style:normal;font-size:.72rem;color:var(--soft);flex-basis:100%;margin-top:.2rem}

/* GLI ERRORI FATALI — rapporti d'incidente declassificati */
.dossier-note{font-size:.92rem;color:var(--soft);margin-bottom:1.1rem;line-height:1.6}
.incident{position:relative;overflow:hidden;background:var(--panel);border:1px solid var(--hair);
  border-left:3px solid var(--rosso);border-radius:4px;padding:1.05rem 1.1rem;margin-bottom:1rem}
.incident .stamp{position:absolute;top:.8rem;right:.7rem;transform:rotate(7deg);border:2px solid var(--rosso);
  color:var(--rosso);font:700 .56rem/1 var(--display);letter-spacing:.16em;text-transform:uppercase;
  padding:.24rem .45rem;border-radius:3px;opacity:.8}
.incident h3{font:700 1.18rem/1.2 var(--body);margin-bottom:.25rem;padding-right:5rem}
.incident .meta{font:700 .6rem/1.3 var(--display);letter-spacing:.11em;text-transform:uppercase;color:var(--soft);margin-bottom:.7rem;display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.incident p{font-size:.94rem;line-height:1.65;margin-bottom:.55rem}
.incident .les{border-top:1px dashed var(--hair);padding-top:.65rem;margin-top:.7rem}
.incident .les b{font:700 .58rem/1 var(--display);letter-spacing:.14em;text-transform:uppercase;color:var(--rosso)}
.incident .les ol{margin:.45rem 0 0 1.1rem;font-size:.88rem;line-height:1.55}
.incident .les li{margin-bottom:.25rem}
.incident .esito{margin-top:.7rem;font:600 .82rem/1.5 var(--body);color:var(--ink)}
.incident .esito b{color:var(--rosso)}
.incident .video{position:relative;margin-top:.9rem;border-radius:4px;overflow:hidden;aspect-ratio:16/9;background:#000}
.incident .video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.vgrid{display:grid;gap:.8rem}
.vgrid .video{position:relative;aspect-ratio:16/9;border-radius:4px;overflow:hidden;background:#000}
.vgrid .video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

.ig{display:flex;align-items:center;justify-content:center;gap:.6rem;margin:0 auto;padding:.9rem 1.4rem;border-radius:99px;
  text-decoration:none;font:700 .95rem/1 var(--body);color:#fff;background:linear-gradient(70deg,#f9ce34,#ee2a7b 45%,#6228d7);max-width:22rem}
footer{display:block;padding:2rem 1.1rem 3rem;text-align:center;color:var(--soft);font-size:.85rem}
footer a.pl{display:inline-block;margin-top:1rem;font:700 .66rem/1 var(--display);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--soft);border:1px solid var(--hair);padding:.6rem 1rem;border-radius:99px}
.err{margin:3rem 1.1rem;padding:1rem;background:var(--sea-1);border-radius:4px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="top"><div class="wrap">
  <a class="back" href="index.html">‹ Plancia Niña</a>
  <span class="tag">Dossier · Skipper</span>
</div></div>

<main id="app"></main>

<div class="lb" id="lb">
  <button class="x" onclick="lbClose()" aria-label="chiudi">✕</button>
  <button class="nav prev" onclick="lbStep(-1)" aria-label="precedente">‹</button>
  <img id="lb-img" alt="">
  <button class="nav next" onclick="lbStep(1)" aria-label="successiva">›</button>
  <div class="count" id="lb-count"></div>
</div>

<script>
const esc = s => String(s ?? "").replace(/[<>&]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
// codici ISO per le bandiere reali (SVG locali) — su Windows le emoji-bandiera
// non si vedono, quindi usiamo immagini
const CC = { Greece: "gr", Croazia: "hr", Spain: "es", Italy: "it", France: "fr",
  Cuba: "cu", Seychelles: "sc", "Saint Vincent": "vc", Turkey: "tr" };
const IT_NAME = { Greece: "Grecia", Croazia: "Croazia", Spain: "Spagna", Italy: "Italia",
  France: "Francia", Cuba: "Cuba", Seychelles: "Seychelles", "Saint Vincent": "Saint Vincent", Turkey: "Turchia" };
const MONTHS = { January: "gennaio", February: "febbraio", March: "marzo", April: "aprile",
  May: "maggio", June: "giugno", July: "luglio", August: "agosto", September: "settembre",
  October: "ottobre", November: "novembre", December: "dicembre" };
const OCEAN = new Set(["Cuba", "Saint Vincent", "Seychelles"]);
const CAT = ["Lagoon", "Bali", "Fountain Pajot", "Fountain-Pajot", "Bali "];

const parts = c => (c || "").split(/[-&]/).map(x => x.trim()).filter(Boolean);
const flag = c => CC[c] ? `<img class="flag" src="skipper/flags/${CC[c]}.svg" alt="${esc(c)}" title="${esc(IT_NAME[c] || c)}">` : "";
const flags = country => parts(country).map(flag).join("");

// scala gradi (stile US Navy): dalle miglia percorse
const RANKS = [
  { min: 0, name: "Mozzo", stars: 0 }, { min: 700, name: "Marinaio scelto", stars: 0 },
  { min: 1600, name: "Nostromo", stars: 0 }, { min: 2600, name: "Guardiamarina", stars: 1 },
  { min: 3600, name: "Sottotenente di Vascello", stars: 1 }, { min: 4600, name: "Tenente di Vascello", stars: 2 },
  { min: 5600, name: "Capitano di Corvetta", stars: 2 }, { min: 6400, name: "Capitano di Fregata", stars: 3 },
  { min: 7000, name: "Capitano di Vascello", stars: 3 }, { min: 7500, name: "Ammiraglio", stars: 5 },
  { min: 10000, name: "Comodoro", stars: 5 },   // livello massimo
];
// separatore delle migliaia italiano (indipendente da Intl): 7735 -> 7.735
const nfmt = n => String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g, ".");
function rankOf(nm) {
  let i = 0;
  for (let k = 0; k < RANKS.length; k++) if (nm >= RANKS[k].min) i = k;
  return { cur: RANKS[i], next: RANKS[i + 1] || null };
}
const medalSVG = `<svg class="medal" viewBox="0 0 100 100" aria-hidden="true">
  <defs><radialGradient id="rg" cx=".5" cy=".38" r=".72">
    <stop offset="0" stop-color="#FBE7A8"/><stop offset=".55" stop-color="#E5C158"/><stop offset="1" stop-color="#9A741A"/>
  </radialGradient></defs>
  <circle cx="50" cy="50" r="49" fill="url(#rg)"/>
  <circle cx="50" cy="50" r="41" fill="#0A1424"/>
  <circle cx="50" cy="50" r="41" fill="none" stroke="#FBE7A8" stroke-width="1.5"/>
  <g fill="none" stroke="#F3D98B" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="26" r="6.5"/><line x1="50" y1="32" x2="50" y2="74"/>
    <line x1="37" y1="43" x2="63" y2="43"/><path d="M29 59 Q31 76 50 78 Q69 76 71 59"/>
  </g></svg>`;

let GAL = [];

function lead(d) {
  const t = d.totals;
  return `Dal <b>${t.first_year}</b> ${d.name.split(" ")[0]} naviga ogni estate come skipper:
    <b>${t.trips} crociere</b> e oltre <b>${nfmt(Math.floor(t.nm / 100) * 100)} miglia</b>
    in <b>${t.seasons} stagioni</b>, dai mari greci alle Baleari, dai Caraibi a Cuba, dalla Corsica
    alle Seychelles. Al comando di <b>${t.n_boats} barche diverse</b> — monoscafi e catamarani da 40 a 54 piedi.`;
}

function theatres(d) {
  const by = {};
  d.trips.forEach(t => parts(t.country).forEach(c => {
    if (!CC[c]) return;
    (by[c] = by[c] || { n: 0, nm: 0 }).n++; by[c].nm += t.nm;
  }));
  const rows = Object.entries(by).sort((a, b) => b[1].n - a[1].n || b[1].nm - a[1].nm).map(([c, s]) =>
    `<div class="th">${flag(c)}<div class="n"><b>${esc(IT_NAME[c] || c)}</b>
      <span>${s.n} ${s.n === 1 ? "missione" : "missioni"}</span></div>
      <div class="mi">${s.nm}<span style="font-size:.6rem"> nm</span></div></div>`).join("");
  return `<section><h2>Teatri operativi · ${Object.keys(by).length} mari</h2><div class="theatres">${rows}</div></section>`;
}

function decorations(d) {
  const t = d.totals;
  const catTrips = d.trips.filter(x => CAT.some(b => (x.boat || "").startsWith(b.trim()))).length;
  const oceanic = d.trips.some(x => parts(x.country).some(c => OCEAN.has(c)));
  const meds = [
    { on: t.nm >= 5000, icon: "🌊", ttl: "5.000 miglia", sub: `${nfmt(t.nm)} nm`,
      why: `Oltre 5.000 miglia nautiche percorse in carriera (${nfmt(t.nm)} nm).` },
    { on: oceanic, icon: "🌍", ttl: "Acque oceaniche", sub: "Caraibi · Oceano Indiano",
      why: "Non solo Mediterraneo: navigazioni in Atlantico/Caraibi e Oceano Indiano." },
    { on: t.seasons >= 10, icon: "🎖️", ttl: "Veterano", sub: `${t.seasons} stagioni`,
      why: `Almeno 10 stagioni di navigazione alle spalle (${t.seasons}).` },
    { on: t.n_boats >= 15, icon: "⚓", ttl: "Comando flotta", sub: `${t.n_boats} barche`,
      why: `Ha comandato più di 15 barche diverse (${t.n_boats}), monoscafi e catamarani.` },
    { on: catTrips >= 5, icon: "🛶", ttl: "Catamarano", sub: `${catTrips} crociere`,
      why: `Almeno 5 crociere al timone di un catamarano (${catTrips}).` },
    { on: t.trips >= 20, icon: "🔱", ttl: "Lupo di mare", sub: `${t.trips} crociere`,
      why: `Più di 20 crociere completate (${t.trips}): un vero lupo di mare.` },
    { on: true, icon: "💜", ttl: "Purple Heart", sub: "caduto in azione", cls: "ph", link: "#errori-fatali",
      why: "Ferito in combattimento con qualche dossier: tocca per «Gli errori fatali»." },
  ].filter(m => m.on);
  const cells = meds.map(m => {
    const in_ = `<div class="disc">${m.icon}</div><b>${m.ttl}</b><span>${m.sub}</span>`;
    return m.link
      ? `<a class="dec ${m.cls || ""}" href="${m.link}" title="${esc(m.why)}">${in_}</a>`
      : `<div class="dec ${m.cls || ""}" title="${esc(m.why)}">${in_}</div>`;
  }).join("");
  return `<section><h2>Decorazioni · ${meds.length}</h2>
    <p class="dossier-note" style="margin-bottom:.9rem">Passa il mouse (o tocca) su una medaglia per il criterio.</p>
    <div class="medals">${cells}</div></section>`;
}

// ritmo del viaggio dalla media giornaliera di miglia (nm/giorno)
function pace(a) {
  if (a == null) return null;
  if (a < 18) return { k: "chill", t: "Chilling", d: "relax, tappe corte" };
  if (a < 30) return { k: "cruise", t: "Crociera", d: "ritmo classico" };
  if (a < 40) return { k: "push", t: "Spinto", d: "ritmo sostenuto" };
  return { k: "extreme", t: "Estremo", d: "navigazione dura" };
}

// icona scafo: catamarano (2 scafi) vs monoscafo, dal modello di barca
const ICON_MONO = `<svg class="bt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16h16l-2.3 4H6.3z"/><path d="M12 3.5v12.5"/><path d="M12 6l5.5 10H12"/></svg>`;
const ICON_CAT = `<svg class="bt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 16h6l-1.3 4H3.8z"/><path d="M15.5 16h6l-1.3 4h-3.4z"/><path d="M6 16h12"/><path d="M12 4v12"/><path d="M12 6l5 10H12"/></svg>`;
const isCat = boat => CAT.some(b => (boat || "").startsWith(b.trim()));
const boatIcon = boat => `<span class="bti" title="${isCat(boat) ? "catamarano" : "monoscafo"}">${isCat(boat) ? ICON_CAT : ICON_MONO}</span>`;

// livello di esperienza richiesto per la zona (ricerca su vento/condizioni)
const DIFF = [null,
  { k: "beg", t: "Principiante" }, { k: "int", t: "Intermedio" },
  { k: "adv", t: "Avanzato" }, { k: "exp", t: "Lupo di mare" }];
function diffOf(zone, month) {
  const z = (zone || "").toLowerCase(), hi = /jul|aug/i.test(month || ""), sep = /sep/i.test(month || "");
  let lvl, why;
  if (/cyclad/.test(z)) { lvl = hi ? 4 : 3; why = "Cicladi: in luglio-agosto soffia il Meltemi da nord, forza 5-7 con raffiche fino a 40 nodi e onda formata nei canali. Zona da veri esperti."; }
  else if (/sardegn|corsica/.test(z)) { lvl = 4; why = "Bocche di Bonifacio: tra i tratti più ventosi del Mediterraneo occidentale — Maestrale 20-35 nodi, effetto Venturi e mare che cambia in fretta."; }
  else if (/dodecan/.test(z)) { lvl = 3; why = "Dodecaneso: Meltemi presente ma più regolare; tratte lunghe, consigliato equipaggio esperto."; }
  else if (/grenadin|carib|cuba/.test(z)) { lvl = 3; why = "Caraibi: alisei costanti 10-20 nodi da est, ma passaggi lunghi ed esposti tra le isole."; }
  else if (/sporad/.test(z)) { lvl = 2; why = "Sporadi: Meltemi più debole (forza 3-4), ma i canali esposti a nord possono rinforzare."; }
  else if (/balear/.test(z)) { lvl = 2; why = "Baleari: venti termici moderati e qualche Tramontana; condizioni generalmente gestibili."; }
  else if (/inner island|seychell/.test(z)) { lvl = 2; why = "Seychelles: distanze brevi e venti prevedibili, ma pochi porti — si vive sull'ancora."; }
  else if (/egadi|sicil/.test(z)) { lvl = sep ? 1 : 2; why = sep ? "Egadi a settembre: condizioni tranquille e calde, ottime per rilassarsi." : "Egadi/Sicilia in estate: venti moderati, qualche giornata di Scirocco o Maestrale."; }
  else if (/ionian/.test(z)) { lvl = 1; why = "Ionio: la zona più calma della Grecia — Maistro leggero e mare piatto. Ideale per iniziare."; }
  else if (/croaz/.test(z)) { lvl = 1; why = "Croazia: acque riparate, venti regolari e baie vicine. Perfetta per i principianti."; }
  else { lvl = 2; why = "Condizioni mediterranee tipiche."; }
  return { ...DIFF[lvl], why };
}

function tripsHTML(d) {
  const oavg = d.totals.days ? Math.round(d.totals.nm / d.totals.days) : null;
  const byYear = {};
  d.trips.slice().reverse().forEach(t => (byYear[t.year] = byYear[t.year] || []).push(t));
  const years = Object.keys(byYear).sort((a, b) => b - a).map(y => {
    const rows = byYear[y].map(t => {
      const avg = t.days ? Math.round(t.nm / t.days) : null;
      const p = pace(avg), df = diffOf(t.zone, t.month);
      return `
      <div class="trip"><span class="fl">${flags(t.country) || "⚓"}</span>
        <span class="pl"><b>${esc((t.zone || t.country || "").replace(/ ?-? ?(GR|CZ|SP)$/, ""))}</b>
          <span class="bl">${boatIcon(t.boat)} ${esc(t.boat || "")}${t.boat_name ? ` · <span class="water">${esc(t.boat_name)}</span>` : ""} · ${t.nm} nm${t.days ? ` · ${t.days} gg` : ""}</span>
          <span class="tags">${p ? `<span class="pace ${p.k}" title="${p.d}">${p.t}</span>` : ""}<span class="diff ${df.k}" title="${esc(df.why)}">⚓ ${df.t}</span></span></span>
        <span class="mi">${avg ?? "—"}<em>nm/giorno</em></span></div>`;
    }).join("");
    return `<div class="year"><h3>${y}</h3>${rows}</div>`;
  }).join("");
  const legend = `<div class="paceleg">
    <span class="pace chill">Chilling</span><span class="pace cruise">Crociera</span><span class="pace push">Spinto</span><span class="pace extreme">Estremo</span>
    <em>Ritmo = miglia ÷ giorni di navigazione. ⚓ = esperienza richiesta dalla zona (Principiante → Lupo di mare, dal vento tipico): passa sopra per il dettaglio.</em></div>`;
  return `<section><h2>Registro di bordo · media ${oavg} nm/giorno</h2>${legend}${years}</section>`;
}

let lbI = 0;
function lbOpen(i) { lbI = i; lbShow(); document.getElementById("lb").classList.add("on"); }
function lbClose() { document.getElementById("lb").classList.remove("on"); }
function lbStep(d) { lbI = (lbI + d + GAL.length) % GAL.length; lbShow(); }
function lbShow() { document.getElementById("lb-img").src = GAL[lbI]; document.getElementById("lb-count").textContent = `${lbI + 1} / ${GAL.length}`; }
document.addEventListener("keydown", e => {
  if (!document.getElementById("lb").classList.contains("on")) return;
  if (e.key === "Escape") lbClose(); if (e.key === "ArrowLeft") lbStep(-1); if (e.key === "ArrowRight") lbStep(1);
});
let tx = 0;
const lb = document.getElementById("lb");
lb.addEventListener("touchstart", e => { tx = e.changedTouches[0].clientX; }, { passive: true });
lb.addEventListener("touchend", e => { const dx = e.changedTouches[0].clientX - tx; if (Math.abs(dx) > 50) lbStep(dx < 0 ? 1 : -1); }, { passive: true });
lb.addEventListener("click", e => { if (e.target === lb) lbClose(); });

  try {
    const r = await fetch("data/skipper.json", { cache: "no-cache" });
    if (!r.ok) throw new Error("skipper");
    render(await r.json());
  } catch (e) {
    document.getElementById("app").innerHTML = `<div class="err"><strong>Scheda skipper non disponibile.</strong>
      Riprova sotto copertura di rete.<br><a href="index.html">‹ Torna alla Plancia</a></div>`;
  }
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
})();
</script>
