<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Edoardo Casella — Skipper · Plancia Niña</title>
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0B1320">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Condensed:wght@600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBFDFF; --sea-1:#EEF4F9; --sea-2:#D8E4EE; --land:#F7EDD2;
  --ink:#0B1320; --soft:#3E556B; --hair:#C4D2DF; --accent:#006B9F;
  --magenta:#C2185B; --verde:#0A7A43; --giallo:#A86400;
  --display:"IBM Plex Sans Condensed",system-ui,sans-serif;
  --body:"IBM Plex Sans",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
@media (prefers-color-scheme: dark){:root{
  --paper:#0A1424; --sea-1:#101E33; --sea-2:#1C3552; --land:#2C2410;
  --ink:#DCE7F5; --soft:#7E95B0; --hair:#22384F; --accent:#35C4E7;
  --magenta:#E8536F; --verde:#2FBF71; --giallo:#E8A33D;
}}
*{box-sizing:border-box;margin:0}
body{background:var(--paper);color:var(--ink);font:400 16px/1.55 var(--body);
  -webkit-font-smoothing:antialiased}
.wrap{max-width:680px;margin:0 auto}
.water{font-style:italic}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
a{color:var(--accent)}

.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb, var(--paper) 86%, transparent);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--hair)}
.top .wrap{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.1rem}
.back{font:700 .66rem/1 var(--display);letter-spacing:.12em;text-transform:uppercase;
  text-decoration:none;color:var(--soft);display:inline-flex;align-items:center;gap:.3rem}
.top .boat{font:700 .72rem/1 var(--display);letter-spacing:.16em;text-transform:uppercase;color:var(--soft)}

/* hero */
.hero{position:relative;height:56vh;min-height:340px;max-height:560px;overflow:hidden;background:var(--sea-2)}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero .grad{position:absolute;inset:0;background:linear-gradient(to top,
  rgba(4,10,20,.86) 0%, rgba(4,10,20,.30) 42%, rgba(4,10,20,.05) 70%)}
.hero .cap{position:absolute;left:0;right:0;bottom:0;padding:1.4rem 1.2rem}
.hero .cap .wrap{color:#fff}
.eyebrow{font:700 .66rem/1 var(--display);letter-spacing:.22em;text-transform:uppercase;
  color:#cfe3f2;margin-bottom:.5rem;display:flex;gap:.55rem;align-items:center}
.hero h1{font:700 2.5rem/1.02 var(--display);letter-spacing:.01em;color:#fff}
.hero .tag{margin-top:.5rem;font-size:1rem;color:#e6eef6;max-width:34rem}

/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.1rem;
  background:var(--hair);border-bottom:1px solid var(--hair)}
.stat{background:var(--paper);padding:1rem .7rem;text-align:center}
.stat b{display:block;font:700 1.7rem/1 var(--mono);font-variant-numeric:tabular-nums;color:var(--accent)}
.stat i{display:block;font:700 .58rem/1.3 var(--display);letter-spacing:.12em;text-transform:uppercase;
  color:var(--soft);font-style:normal;margin-top:.4rem}

section{padding:1.7rem 1.1rem}
h2{font:700 .74rem/1 var(--display);letter-spacing:.18em;text-transform:uppercase;color:var(--soft);
  margin-bottom:1rem;display:flex;align-items:baseline;gap:.6rem;border-left:3px solid var(--accent);padding-left:.55rem}
h2::after{content:"";flex:1;height:1px;background:var(--hair)}
.lead{font-size:1.06rem;line-height:1.7}
.lead b{color:var(--ink)}
.chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:1rem}
.chip{font:600 .8rem/1 var(--body);padding:.42rem .7rem;border:1px solid var(--hair);border-radius:99px;
  background:var(--sea-1);color:var(--soft)}

/* galleria */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem}
@media(max-width:520px){.grid{grid-template-columns:repeat(2,1fr)}}
.grid button{padding:0;border:0;background:var(--sea-2);border-radius:4px;overflow:hidden;
  aspect-ratio:1;cursor:pointer;position:relative}
.grid img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.grid button:hover img{transform:scale(1.06)}

/* lightbox */
.lb{position:fixed;inset:0;z-index:60;background:rgba(3,8,16,.94);display:none;
  align-items:center;justify-content:center;flex-direction:column;touch-action:pan-y}
.lb.on{display:flex}
.lb img{max-width:96vw;max-height:82vh;object-fit:contain;border-radius:4px;
  box-shadow:0 10px 60px rgba(0,0,0,.6)}
.lb .x{position:absolute;top:.8rem;right:1rem;width:2.6rem;height:2.6rem;border:0;border-radius:50%;
  background:rgba(255,255,255,.14);color:#fff;font-size:1.3rem;cursor:pointer}
.lb .nav{position:absolute;top:50%;transform:translateY(-50%);width:3rem;height:3rem;border:0;
  border-radius:50%;background:rgba(255,255,255,.14);color:#fff;font-size:1.5rem;cursor:pointer}
.lb .prev{left:.6rem} .lb .next{right:.6rem}
.lb .count{position:absolute;bottom:1.1rem;color:#cfe3f2;font:600 .8rem/1 var(--mono);letter-spacing:.1em}

/* crociere */
.year{margin-top:1.2rem}
.year:first-child{margin-top:0}
.year h3{font:700 1.3rem/1 var(--mono);color:var(--ink);margin-bottom:.5rem}
.trip{display:flex;gap:.7rem;align-items:baseline;padding:.55rem 0;border-bottom:1px solid var(--hair)}
.trip:last-child{border-bottom:0}
.trip .fl{font-size:1.15rem;flex:none;width:1.5rem;text-align:center}
.trip .pl{flex:1;min-width:0}
.trip .pl b{font-weight:600}
.trip .pl span{display:block;font-size:.8rem;color:var(--soft)}
.trip .mi{flex:none;font:600 .95rem/1 var(--mono);color:var(--accent);text-align:right}
.trip .mi em{display:block;font:400 .64rem/1.3 var(--display);color:var(--soft);font-style:normal;
  letter-spacing:.08em;text-transform:uppercase;margin-top:.2rem}

/* instagram + footer */
.ig{display:flex;align-items:center;justify-content:center;gap:.6rem;margin:0 auto;
  padding:.9rem 1.4rem;border-radius:99px;text-decoration:none;font:700 .95rem/1 var(--body);
  color:#fff;background:linear-gradient(70deg,#f9ce34,#ee2a7b 45%,#6228d7);max-width:22rem}
foot,footer{display:block;padding:2rem 1.1rem 3rem;text-align:center;color:var(--soft);font-size:.85rem}
footer a.pl{display:inline-block;margin-top:1rem;font:700 .66rem/1 var(--display);letter-spacing:.12em;
  text-transform:uppercase;text-decoration:none;color:var(--soft);border:1px solid var(--hair);
  padding:.6rem 1rem;border-radius:99px}
.err{margin:3rem 1.1rem;padding:1rem;background:var(--land);border-radius:4px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="top"><div class="wrap">
  <a class="back" href="index.html">‹ Plancia Niña</a>
  <span class="boat">⛵ Skipper</span>
</div></div>

<main id="app"></main>

<div class="lb" id="lb">
  <button class="x" onclick="lbClose()" aria-label="chiudi">✕</button>
  <button class="nav prev" onclick="lbStep(-1)" aria-label="precedente">‹</button>
  <img id="lb-img" alt="">
  <button class="nav next" onclick="lbStep(1)" aria-label="successiva">›</button>
  <div class="count" id="lb-count"></div>
</div>

<script>
const esc = s => String(s ?? "").replace(/[<>&]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
const FLAG = { Greece: "🇬🇷", Croazia: "🇭🇷", Spain: "🇪🇸", Italy: "🇮🇹", France: "🇫🇷",
  Cuba: "🇨🇺", Seychelles: "🇸🇨", "Saint Vincent": "🇻🇨", Turkey: "🇹🇷" };
const flagOf = c => (c || "").split(/[-&]/).map(x => FLAG[x.trim()]).filter(Boolean).join("") || "⚓";
const MONTHS = { January: "gennaio", February: "febbraio", March: "marzo", April: "aprile",
  May: "maggio", June: "giugno", July: "luglio", August: "agosto", September: "settembre",
  October: "ottobre", November: "novembre", December: "dicembre" };

let GAL = [];

function lead(d) {
  const t = d.totals;
  return `Dal <b>${t.first_year}</b> ${d.name.split(" ")[0]} naviga ogni estate come skipper:
    <b>${t.trips} crociere</b> e oltre <b>${(Math.floor(t.nm / 100) * 100).toLocaleString("it")} miglia</b>
    in <b>${t.seasons} stagioni</b>, dai mari greci alle Baleari, dai Caraibi a Cuba, dalla Corsica
    alle Seychelles. Ha condotto <b>${t.n_boats} barche diverse</b> — monoscafi e catamarani da 40 a 54 piedi —
    tra Cicladi, Dodecaneso, Sporadi, Grenadine e l'arcipelago della Maddalena.`;
}

function galleryHTML(d) {
  GAL = d.gallery || [];
  if (!GAL.length) return "";
  const cells = GAL.map((src, i) =>
    `<button onclick="lbOpen(${i})"><img loading="lazy" src="${src}" alt="Foto di viaggio ${i + 1}"></button>`).join("");
  return `<section><h2>In navigazione</h2><div class="grid">${cells}</div></section>`;
}

function tripsHTML(d) {
  const byYear = {};
  d.trips.slice().reverse().forEach(t => (byYear[t.year] = byYear[t.year] || []).push(t));
  const years = Object.keys(byYear).sort((a, b) => b - a).map(y => {
    const rows = byYear[y].map(t => `
      <div class="trip">
        <span class="fl">${flagOf(t.country)}</span>
        <span class="pl"><b>${esc((t.zone || t.country || "").replace(/ ?-? ?(GR|CZ|SP)$/, ""))}</b>
          <span>${esc(t.boat || "")}${t.boat_name ? ` · <span class="water">${esc(t.boat_name)}</span>` : ""}${t.month ? ` · ${MONTHS[t.month] || t.month.toLowerCase()}` : ""}</span></span>
        <span class="mi">${t.nm} nm<em>${t.days ? t.days + " gg" : ""}</em></span>
      </div>`).join("");
    return `<div class="year"><h3>${y}</h3>${rows}</div>`;
  }).join("");
  return `<section><h2>Le crociere · ${d.totals.first_year}–${d.totals.last_year}</h2>${years}</section>`;
}

function render(d) {
  const t = d.totals;
  const hero = d.gallery[0] || "icon-512.png";
  document.getElementById("app").innerHTML = `
  <div class="hero">
    <img src="${hero}" alt="Niña in navigazione">
    <div class="grad"></div>
    <div class="cap"><div class="wrap">
      <div class="eyebrow">⚓ Skipper · ${t.first_year}–${t.last_year}</div>
      <h1>${esc(d.name)}</h1>
      <div class="tag">${t.trips} crociere, ${t.nm.toLocaleString("it")} miglia, ${t.n_countries} mari. Al timone della <span class="water">Niña</span>.</div>
    </div></div>
  </div>

  <div class="stats">
    <div class="stat"><b>${t.trips}</b><i>crociere</i></div>
    <div class="stat"><b>${(t.nm / 1000).toFixed(1).replace(".", ",")}k</b><i>miglia</i></div>
    <div class="stat"><b>${t.seasons}</b><i>stagioni</i></div>
    <div class="stat"><b>${t.n_countries}</b><i>mari</i></div>
    <div class="stat"><b>${t.n_boats}</b><i>barche</i></div>
  </div>

  <section><h2>Esperienza</h2>
    <p class="lead">${lead(d)}</p>
    <div class="chips">${t.countries.map(c => `<span class="chip">${flagOf(c)} ${esc(c)}</span>`).join("")}</div>
  </section>

  ${galleryHTML(d)}
  ${tripsHTML(d)}

  <section style="text-align:center">
    <h2 style="justify-content:center">Seguilo</h2>
    <a class="ig" href="${esc(d.instagram)}" target="_blank" rel="noopener">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
      @edoardocasella
    </a>
  </section>

  <footer>
    Le miglia e le crociere sono dal registro di bordo personale dello skipper.
    <br><a class="pl" href="index.html">‹ Torna alla Plancia Niña</a>
  </footer>`;
}

// lightbox
let lbI = 0;
function lbOpen(i) { lbI = i; lbShow(); document.getElementById("lb").classList.add("on"); }
function lbClose() { document.getElementById("lb").classList.remove("on"); }
function lbStep(d) { lbI = (lbI + d + GAL.length) % GAL.length; lbShow(); }
function lbShow() {
  document.getElementById("lb-img").src = GAL[lbI];
  document.getElementById("lb-count").textContent = `${lbI + 1} / ${GAL.length}`;
}
document.addEventListener("keydown", e => {
  if (!document.getElementById("lb").classList.contains("on")) return;
  if (e.key === "Escape") lbClose();
  if (e.key === "ArrowLeft") lbStep(-1);
  if (e.key === "ArrowRight") lbStep(1);
});
let tx = 0;
const lb = document.getElementById("lb");
lb.addEventListener("touchstart", e => { tx = e.changedTouches[0].clientX; }, { passive: true });
lb.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) lbStep(dx < 0 ? 1 : -1);
}, { passive: true });
lb.addEventListener("click", e => { if (e.target === lb) lbClose(); });

(async () => {
  try {
    const r = await fetch("data/skipper.json", { cache: "no-cache" });
    if (!r.ok) throw new Error("skipper");
    render(await r.json());
  } catch (e) {
    document.getElementById("app").innerHTML = `<div class="err">
      <strong>Scheda skipper non disponibile.</strong> Riprova sotto copertura di rete.
      <br><a href="index.html">‹ Torna alla Plancia</a></div>`;
  }
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
})();
</script>
</body>
</html>
