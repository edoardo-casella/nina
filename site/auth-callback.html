<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accesso in corso… · Everywaves</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="theme-color" content="#0A1424">
<script src="theme.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<style>
:root{--paper:#FBFDFF;--ink:#0B1320;--soft:#3E556B;--accent:#006B9F}
@media (prefers-color-scheme: dark){:root{--paper:#070E1A;--ink:#DCE7F5;--soft:#8299B4;--accent:#35C4E7}}
body{background:var(--paper);color:var(--ink);font:400 17px/1.6 system-ui,sans-serif;display:grid;place-items:center;min-height:100vh;margin:0}
.box{text-align:center;padding:2rem}
a{color:var(--accent)}
.soft{color:var(--soft);font-size:.9rem}
</style>
</head>
<body>
<div class="box">
  <p style="font-size:2rem">⚓</p>
  <p id="m"><b>Accesso in corso…</b></p>
  <p class="soft" id="s">Sto verificando il link.</p>
</div>
<script>
// Pagina di atterraggio del magic link (PKCE: il codice arriva in ?code=,
// mai nell'hash — l'hash resta libero per il routing di membro.html).
// supabase-js scambia il codice da solo (detectSessionInUrl); qui aspettiamo
// la sessione e rimandiamo all'hub dell'area riservata.
(async () => {
  const m = document.getElementById("m"), s = document.getElementById("s");
  if (!window.ninaAuth || !ninaAuth.enabled) { location.replace("login.html"); return; }
  const c = await ninaAuth.client();
  if (!c) { m.innerHTML = "<b>Rete assente.</b>"; s.innerHTML = 'Riprova, poi <a href="login.html">torna al login</a>.'; return; }
  for (let i = 0; i < 20; i++) {                    // ~5s: lo scambio del code è asincrono
    const { data } = await c.auth.getSession();
    if (data.session) { location.replace("login.html"); return; }
    await new Promise(r => setTimeout(r, 250));
  }
  m.innerHTML = "<b>Il link non è più valido.</b>";
  s.innerHTML = 'I link scadono e valgono una volta sola: <a href="login.html">chiedine uno nuovo</a>.';
})();
</script>
</body>
</html>
