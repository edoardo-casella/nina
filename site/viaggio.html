<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Viaggi · Plancia Niña</title>
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0A1424">
<script src="theme.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans+Condensed:wght@600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBFDFF; --sea-1:#EEF4F9; --sea-2:#D8E4EE; --panel:#FFFFFF;
  --ink:#0B1320; --soft:#3E556B; --hair:#C4D2DF; --accent:#006B9F; --gold:#B8860B; --gold-2:#E5C158; --verde:#0A7A43;
  --display:"IBM Plex Sans Condensed",system-ui,sans-serif; --body:"IBM Plex Sans",system-ui,sans-serif; --mono:"IBM Plex Mono",ui-monospace,monospace;
}
@media (prefers-color-scheme: dark){:root{
  --paper:#070E1A; --sea-1:#101E33; --sea-2:#1C3552; --panel:#0C1728;
  --ink:#DCE7F5; --soft:#8299B4; --hair:#22384F; --accent:#35C4E7; --gold:#E5C158; --gold-2:#FBE7A8; --verde:#2FBF71;
}}
*{box-sizing:border-box;margin:0}
body{background:var(--paper);color:var(--ink);font:400 16px/1.55 var(--body);-webkit-font-smoothing:antialiased}
main{max-width:720px;margin:0 auto;border-left:1px solid var(--hair);border-right:1px solid var(--hair);min-height:100vh}
.wrap{max-width:720px;margin:0 auto}
a{color:var(--accent)}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.flag{width:26px;height:17px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.2),0 1px 2px rgba(0,0,0,.25);vertical-align:-2px;margin-right:.15rem}
.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb, var(--paper) 88%, transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--hair)}
.top .wrap{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.1rem}
.back{font:700 .66rem/1 var(--display);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--soft)}
.top .tag{font:700 .66rem/1 var(--display);letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
section{padding:0 1.1rem 1.6rem}
h2{font:700 .74rem/1 var(--display);letter-spacing:.2em;text-transform:uppercase;color:var(--soft);
  margin:1.5rem 0 1rem;display:flex;align-items:center;gap:.55rem;border-left:3px solid var(--gold);padding-left:.55rem}
h2::after{content:"";flex:1;height:1px;background:var(--hair)}
.vhero{padding:1.6rem 1.1rem .2rem}
.vhero .yr{font:700 .66rem/1 var(--display);letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
.vhero h1{font:700 2.2rem/1.03 var(--display);letter-spacing:.01em;margin:.4rem 0 .2rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.vhero .sub{color:var(--soft);font-size:.98rem}
.vhero .sub b{color:var(--ink)}
.vstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(60px,1fr));gap:1px;background:var(--hair);border:1px solid var(--hair);border-radius:6px;overflow:hidden;margin-top:1.2rem}
.vstat{background:var(--panel);padding:.85rem .3rem;text-align:center}
.vtags{display:flex;flex-wrap:wrap;align-items:center;gap:.45rem;margin-top:.85rem}
.bti{display:inline-flex;color:var(--soft)} .bti .bt{width:1.5rem;height:1.5rem}
.pace,.diff{display:inline-flex;align-items:center;gap:.25rem;font:700 .6rem/1 var(--display);letter-spacing:.05em;text-transform:uppercase;border-radius:99px;padding:.34rem .62rem}
.pace.chill{background:rgba(47,191,113,.16);color:var(--verde)}
.pace.cruise{background:rgba(0,107,159,.15);color:var(--accent)}
.pace.push{background:rgba(184,134,11,.18);color:var(--gold)}
.pace.extreme{background:rgba(197,48,48,.16);color:#C53030}
.diff{background:var(--sea-1);color:var(--soft);border:1px solid var(--hair)}
.vstat b{display:block;font:700 1.35rem/1 var(--mono);color:var(--ink)}
.vstat i{display:block;font:700 .5rem/1.3 var(--display);letter-spacing:.09em;text-transform:uppercase;color:var(--soft);font-style:normal;margin-top:.4rem}
.chips{display:flex;flex-wrap:wrap;gap:.4rem}
.chip{font:600 .8rem/1 var(--body);background:var(--panel);border:1px solid var(--hair);border-radius:99px;padding:.36rem .7rem}
.chip.lk{display:inline-flex;align-items:center;gap:.4rem;text-decoration:none;color:inherit;padding:.24rem .7rem .24rem .26rem}
.chip.lk:hover{border-color:var(--accent);color:var(--accent)}
.cav{width:22px;height:22px;border-radius:50%;object-fit:cover;flex:none;background:var(--sea-2)}
.cav.ph{display:inline-flex;align-items:center;justify-content:center;font:700 .66rem/1 var(--display);color:#fff;background:var(--accent)}
/* equipaggio di quell'anno: griglia di ritratti grandi (foto ~4x + nome sotto) */
.crewgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:.9rem .5rem;margin-top:.3rem}
.crewgrid .chip.lk{flex-direction:column;text-align:center;border:0;background:none;padding:.2rem;gap:.45rem;font-size:.74rem;line-height:1.16}
.crewgrid .chip.lk:hover{color:var(--accent)}
.crewgrid .cav{width:88px;height:88px}
.crewgrid .cav.ph{font:700 2rem/1 var(--display)}
.crewgrid .cg-nm{display:block}
.crewgrid .cg-rank{line-height:0;margin-top:-.15rem}
.crewgrid .cg-rank .ins{display:block;height:15px;width:26px;margin:0 auto;overflow:visible}
.fleetnote{font:600 .82rem/1.45 var(--body);color:var(--soft);margin:.1rem 0 .7rem}
.chip.me{border-color:var(--gold);color:var(--gold);font-weight:700}
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.5rem}
.gal img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:5px;cursor:pointer;background:var(--sea-2);display:block}
.noph{background:var(--sea-1);border:1px dashed var(--hair);border-radius:5px;padding:1rem;color:var(--soft);font-size:.9rem;text-align:center}
.plink{color:inherit;text-decoration:none;border-bottom:1px dotted var(--accent)}
.plink:hover{color:var(--accent)}
.story{background:var(--panel);border:1px solid var(--hair);border-left:3px solid var(--gold);border-radius:6px;padding:1rem 1.1rem;font-size:.96rem;line-height:1.62}
.story b{color:var(--ink)}
.route{width:100%;border:1px solid var(--hair);border-radius:8px;display:block;cursor:zoom-in;background:var(--sea-1)}
.gmap{max-width:520px;margin:.4rem auto 0}
.gcap{color:var(--soft);font-size:.85rem;text-align:center;margin:.6rem auto 0;max-width:520px}
.nav2{display:flex;justify-content:space-between;gap:.6rem;margin-top:1.6rem}
.nav2 a{flex:1;text-decoration:none;color:var(--ink);background:var(--panel);border:1px solid var(--hair);border-radius:6px;padding:.6rem .8rem;font-size:.86rem}
.nav2 a small{display:block;font:700 .54rem/1.3 var(--display);letter-spacing:.09em;text-transform:uppercase;color:var(--soft)}
.nav2 a.next{text-align:right}
/* directory */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.8rem}
.tcard{background:var(--panel);border:1px solid var(--hair);border-radius:8px;overflow:hidden;text-decoration:none;color:inherit;display:block}
.tcard .ph{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--sea-1);display:flex;align-items:center;justify-content:center}
.tcard .ph.none{color:var(--soft);font-size:1.6rem}
.tcard .ph.rt{object-fit:contain;background:var(--sea-1)}
.tcard .b{padding:.55rem .7rem}
.tcard .b b{display:block;font-size:.95rem}
.tcard .b span{font:700 .56rem/1.3 var(--display);letter-spacing:.06em;text-transform:uppercase;color:var(--soft)}
.tcard .b .pc{color:var(--gold)}
/* lightbox */
#lb{position:fixed;inset:0;z-index:80;background:rgba(3,7,14,.95);display:none;align-items:center;justify-content:center;flex-direction:column}
#lb.on{display:flex}
#lb img{max-width:96vw;max-height:82vh;object-fit:contain;border-radius:4px}
#lb .x{position:absolute;top:.8rem;right:1rem;color:#fff;font-size:1.8rem;background:none;border:0;cursor:pointer;line-height:1}
#lb .arr{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:2.4rem;background:none;border:0;cursor:pointer;padding:.5rem 1rem}
#lb .arr.l{left:0} #lb .arr.r{right:0}
#lb .cnt{color:#cfe0ee;font:600 .8rem/1 var(--mono);margin-top:.8rem}
#lb .lbppl{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;max-width:96vw;margin-top:.6rem;padding:0 .5rem}
#lb .lbppl a{display:inline-flex;align-items:center;gap:.35rem;text-decoration:none;font:600 .8rem/1 var(--body);color:#eaf2fa;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);border-radius:99px;padding:.22rem .62rem .22rem .24rem}
#lb .lbppl a:hover{background:rgba(255,255,255,.22)}
#lb .lbppl .cav{width:20px;height:20px;border-radius:50%;object-fit:cover;flex:none;background:var(--sea-2)}
#lb .lbppl .cav.ph{display:inline-flex;align-items:center;justify-content:center;font:700 .62rem/1 var(--display);color:#fff;background:var(--accent)}
footer{display:block;padding:1.8rem 1.1rem 3rem;text-align:center;color:var(--soft);font-size:.85rem}
footer a.pl{display:inline-block;margin-top:1rem;font:700 .66rem/1 var(--display);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--soft);border:1px solid var(--hair);padding:.6rem 1rem;border-radius:99px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="top"><div class="wrap">
  <a class="back" href="index.html">‹ Plancia</a>
  <span class="tag">⛵ I viaggi</span>
</div></div>
<main id="app"></main>
<div id="lb" role="dialog" aria-modal="true">
  <button class="x" aria-label="chiudi">✕</button>
  <button class="arr l" aria-label="precedente">‹</button>
  <img alt="">
  <button class="arr r" aria-label="successiva">›</button>
  <div class="cnt"></div>
  <div class="lbppl"></div>
</div>

<script>
const esc = s => String(s ?? "").replace(/[<>&]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
const CC = { Greece: "gr", Croazia: "hr", Spain: "es", Italy: "it", France: "fr", Cuba: "cu", Seychelles: "sc", "Saint Vincent": "vc", "Saint Lucia": "lc", Turkey: "tr" };
const IT_NAME = { Greece: "Grecia", Croazia: "Croazia", Spain: "Spagna", Italy: "Italia", France: "Francia", Cuba: "Cuba", Seychelles: "Seychelles", "Saint Vincent": "Saint Vincent", "Saint Lucia": "Santa Lucia", Turkey: "Turchia" };
const MONTHS = { January: "gennaio", February: "febbraio", March: "marzo", April: "aprile", May: "maggio", June: "giugno", July: "luglio", August: "agosto", September: "settembre", October: "ottobre", November: "novembre", December: "dicembre" };
// indice mese (0-11) per ordinare i viaggi in ordine di calendario dentro lo stesso anno
const monthIdx = m => { const i = Object.keys(MONTHS).indexOf(m); return i < 0 ? 99 : i; };
// mappa viaggio (id = slug nome barca) -> immagine rotta in trips/routes/<slug>.png
const ROUTE = {
  nemo: "cyclades-11", camelia: "croazia-11", natfika: "cyclades-12", stephanie: "dodecaneso-12",
  klaudia: "turkey-13", cubalibre: "baleares-14", anax: "sporades-14",
  "blue-bird": "baleares-i-15", trocha: "baleare-ii-15", aquarela: "baleares-16",
  sorbe: "caribe-17", "capitan-nikos": "cyclades-17", showtime: "ionian-17",
  invitation: "baleares-18", ondine: "croazia-18", lohengrin: "cuba-19",
  alba: "sardegna-20", enya: "corsica-21", silkwave: "sardegna-21", "mars-planet": "sicilia-21",
  challenger: "baleari-22", isla: "sicilia-23", "all-in": "sporades-22",
  cari: "seychelles-24", alexandros: "cyclades-2024"
};
const parts = c => (c || "").split(/[-&]/).map(x => x.trim()).filter(Boolean);
const flag1 = c => CC[c] ? `<img class="flag" src="skipper/flags/${CC[c]}.svg" alt="${esc(c)}" title="${esc(IT_NAME[c] || c)}">` : "";
const flags = country => parts(country).map(flag1).join("");
const cleanZone = z => (z || "").replace(/\s*-\s*(GR|SP|IT|TR|FR)\s*$/i, "").replace(/\s+CZ$/i, "").trim();
const itCountry = c => parts(c).map(p => IT_NAME[p] || p).join(" · ");

let LB = [], LBi = 0;
function openLB(list, i) { LB = list; LBi = i; showLB(); document.getElementById("lb").classList.add("on"); }
function showLB() {
  const lb = document.getElementById("lb");
  const cur = LB[LBi] || {};
  lb.querySelector("img").src = cur.src || "";
  lb.querySelector(".cnt").textContent = (LBi + 1) + " / " + LB.length;
  lb.querySelector(".lbppl").innerHTML = (cur.people || []).map(crewChipById).filter(Boolean).join("");
}
function moveLB(d) { LBi = (LBi + d + LB.length) % LB.length; showLB(); }
(function () {
  const lb = document.getElementById("lb");
  lb.querySelector(".x").onclick = () => lb.classList.remove("on");
  lb.querySelector(".arr.l").onclick = e => { e.stopPropagation(); moveLB(-1); };
  lb.querySelector(".arr.r").onclick = e => { e.stopPropagation(); moveLB(1); };
  lb.onclick = e => { if (e.target === lb || e.target.tagName === "IMG") lb.classList.remove("on"); };
  document.addEventListener("keydown", e => {
    if (!lb.classList.contains("on")) return;
    if (e.key === "Escape") lb.classList.remove("on");
    if (e.key === "ArrowLeft") moveLB(-1);
    if (e.key === "ArrowRight") moveLB(1);
  });
})();

const normName = s => (s || "").toLowerCase().normalize("NFD").replace(/[^a-z]/g, "");
let CREWMAP = {}, CREWBYID = {};
function buildCrewMap(people) {
  CREWMAP = {}; CREWBYID = {};
  people.forEach(p => { CREWBYID[p.id] = p; CREWMAP[normName(p.name)] = p; });
  // alias nickname 2026 vs nome registro nei viaggi
  [["gabrielem", "gabri-m"], ["federicob", "fede-b"]].forEach(([n, id]) => { if (CREWBYID[id]) CREWMAP[n] = CREWBYID[id]; });
}
function crewChip(name, year) {
  const p = CREWMAP[normName(name)];
  const photo = p && ((p.crew2026 && p.crew2026.photo) || p.photo);
  const av = photo ? `<img class="cav" src="${photo}" alt="" loading="lazy">` : `<span class="cav ph">${esc((name || "?").trim()[0])}</span>`;
  let badge = "";
  if (p && year != null) {
    const g = gradeAt(p.track || "marinaio", histDays(p, year) + (p.ext_days || 0));
    badge = `<span class="cg-rank" title="${esc(g[2])} · a fine ${year}">${rankSVG(g[1])}</span>`;
  }
  if (p) { const href = (p.crew2026 && p.crew2026.link) || `membro.html#${p.id}`; return `<a class="chip lk" href="${href}">${av}<span class="cg-nm">${esc(name)}</span>${badge}</a>`; }
  return `<span class="chip lk"><span class="cav ph">${esc((name || "?").trim()[0])}</span><span class="cg-nm">${esc(name)}</span></span>`;
}
// chip persona per id (foto taggate nella galleria/lightbox)
function crewChipById(id) {
  const p = CREWBYID[id];
  if (!p) return "";
  const photo = (p.crew2026 && p.crew2026.photo) || p.photo;
  const av = photo ? `<img class="cav" src="${photo}" alt="" loading="lazy">` : `<span class="cav ph">${esc((p.name || "?").trim()[0])}</span>`;
  const href = (p.crew2026 && p.crew2026.link) || `membro.html#${p.id}`;
  return `<a class="chip lk" href="${href}">${av}${esc(p.name)}</a>`;
}

// --- gradi a DUE CARRIERE, storicizzati -------------------------------------
// il grado dell'equipaggio riflette la CARRIERA (comandante/marinaio/abilitato,
// dalla persona) + l'esperienza (giorni) accumulata FINO all'anno del viaggio.
const GRADES = {
  marinaio: [[0, "mozzo", "Mozzo"], [7, "marinaio", "Marinaio"], [20, "marinaio-scelto", "Marinaio scelto"], [45, "nostromo", "Nostromo"], [80, "sottoten", "Sottotenente di vascello"], [130, "tenente", "Tenente di vascello"]],
  comandante: [[0, "cap-corvetta", "Capitano di corvetta"], [70, "cap-fregata", "Capitano di fregata"], [140, "cap-vascello", "Capitano di vascello"], [220, "contrammiraglio", "Contrammiraglio"], [280, "ammiraglio", "Ammiraglio"], [560, "grande-ammiraglio", "Grande Ammiraglio"]],
  abilitato: [[0, "abilitato", "Abilitato al comando"]],
};
function gradeAt(track, days) { const L = GRADES[track] || GRADES.marinaio; let g = L[0]; for (const s of L) if (days >= s[0]) g = s; return g; }
function histDays(p, year) {
  return ((p && p.trips_list) || []).filter(t => t.year <= year).reduce((s, t) => s + (t.pdays || 0), 0);
}
function starPath(cx, cy, r) { let p = ""; for (let i = 0; i < 10; i++) { const a = -Math.PI / 2 + i * Math.PI / 5, rr = i % 2 ? r * 0.4 : r; p += (i ? "L" : "M") + (cx + rr * Math.cos(a)).toFixed(1) + " " + (cy + rr * Math.sin(a)).toFixed(1); } return p + "Z"; }
function rankSVG(r) {
  const G = "#C9A227", S = "#AEB6BD", E = "rgba(0,0,0,.35)";
  const open = '<svg viewBox="0 0 44 24" class="ins">';
  const bar = (x, c) => `<rect x="${x}" y="4.5" width="5.5" height="15" rx="2" fill="${c}" stroke="${E}" stroke-width=".6"/>`;
  const chev = (cy, c) => `<path d="M13,${cy + 5} L22,${cy} L31,${cy + 5}" fill="none" stroke="${c}" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>`;
  const leaf = c => `<g transform="translate(22,12)"><path d="M0,-9 C3.2,-5 7,-4 5.6,0 C8,1.6 6.6,6 3,6.6 C3.6,9 0,9 0,9.6 C0,9 -3.6,9 -3,6.6 C-6.6,6 -8,1.6 -5.6,0 C-7,-4 -3.2,-5 0,-9 Z" fill="${c}" stroke="${E}" stroke-width=".6"/><path d="M0,-7 L0,8.6" stroke="${E}" stroke-width=".7" opacity=".45" fill="none"/></g>`;
  const eagle = c => `<g fill="${c}" stroke="${E}" stroke-width=".5"><path d="M22,10.6 C15,8 7,9.4 3,13 C10,12 16,12.6 22,13.6 C28,12.6 34,12 41,13 C37,9.4 29,8 22,10.6 Z"/><circle cx="22" cy="8.4" r="2"/><path d="M22,6.8 L24.2,8 L22,9.2 Z"/></g>`;
  const star = x => `<path d="${starPath(x, 12, 4.4)}" fill="${G}" stroke="${E}" stroke-width=".4"/>`;
  const anchor = c => `<g transform="translate(22,12)" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="0" cy="-7" r="2.1"/><line x1="0" y1="-4.9" x2="0" y2="7.6"/><path d="M-5.6,2.6 Q0,10.6 5.6,2.6"/><line x1="-3.7" y1="-1.2" x2="3.7" y2="-1.2"/></g>`;
  switch (r) {
    case "mozzo": return open + anchor(S) + "</svg>";
    case "marinaio": return open + chev(11, S) + "</svg>";
    case "marinaio-scelto": return open + chev(8, S) + chev(14, S) + "</svg>";
    case "nostromo": return open + chev(5, S) + chev(11, S) + chev(17, S) + "</svg>";
    case "sottoten": return open + bar(19.7, S) + "</svg>";
    case "tenente": return open + bar(16.2, S) + bar(23.2, S) + "</svg>";
    case "abilitato": return open + `<circle cx="22" cy="12" r="8.5" fill="none" stroke="${G}" stroke-width="1.4" stroke-dasharray="2.8 2.3"/>` + anchor(G) + "</svg>";
    case "cap-corvetta": return open + leaf(G) + "</svg>";
    case "cap-fregata": return open + eagle(G) + "</svg>";
    case "cap-vascello": return open + star(22) + "</svg>";
    case "contrammiraglio": return open + star(15) + star(29) + "</svg>";
    case "ammiraglio": return open + [7, 18, 29, 40].map(star).join("") + "</svg>";
    case "grande-ammiraglio": return open + `<ellipse cx="22" cy="12" rx="21" ry="11" fill="none" stroke="${G}" stroke-width="1" opacity=".65"/>` + [7, 18, 29, 40].map(star).join("") + "</svg>";
    default: return open + `<circle cx="22" cy="12" r="3.4" fill="none" stroke="${S}" stroke-width="1.5" opacity=".55"/></svg>`;
  }
}

// paese cliccabile → paese.html#<iso>
const countryLinks = c => parts(c).map(p => CC[p] ? `<a href="paese.html#${CC[p]}">${esc(IT_NAME[p] || p)}</a>` : esc(IT_NAME[p] || p)).join(" · ");
// tag (portati dal dossier skipper): ritmo, esperienza, icona scafo
const CAT = ["Lagoon", "Bali", "Fountain Pajot", "Fountain-Pajot"];
const isCat = boat => CAT.some(b => (boat || "").startsWith(b.trim()));
const ICON_MONO = `<svg class="bt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16h16l-2.3 4H6.3z"/><path d="M12 3.5v12.5"/><path d="M12 6l5.5 10H12"/></svg>`;
const ICON_CAT = `<svg class="bt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 16h6l-1.3 4H3.8z"/><path d="M15.5 16h6l-1.3 4h-3.4z"/><path d="M6 16h12"/><path d="M12 4v12"/><path d="M12 6l5 10H12"/></svg>`;
const boatIcon = boat => `<span class="bti" title="${isCat(boat) ? "catamarano" : "monoscafo"}">${isCat(boat) ? ICON_CAT : ICON_MONO}</span>`;
function pace(a) {
  if (a == null) return null;
  if (a < 18) return { k: "chill", t: "Chilling", d: "relax, tappe corte" };
  if (a < 30) return { k: "cruise", t: "Crociera", d: "ritmo classico" };
  if (a < 40) return { k: "push", t: "Spinto", d: "ritmo sostenuto" };
  return { k: "extreme", t: "Estremo", d: "navigazione dura" };
}
const DIFF = [null, { k: "beg", t: "Principiante" }, { k: "int", t: "Intermedio" }, { k: "adv", t: "Avanzato" }, { k: "exp", t: "Lupo di mare" }];
function diffOf(zone, month) {
  const z = (zone || "").toLowerCase(), hi = /jul|aug/i.test(month || ""), sep = /sep/i.test(month || "");
  let lvl, why;
  if (/cyclad/.test(z)) { lvl = hi ? 4 : 3; why = "Cicladi: in luglio-agosto soffia il Meltemi da nord, forza 5-7 con raffiche fino a 40 nodi. Zona da esperti."; }
  else if (/sardegn|corsica/.test(z)) { lvl = 4; why = "Bocche di Bonifacio: tra i tratti più ventosi del Mediterraneo — Maestrale 20-35 nodi ed effetto Venturi."; }
  else if (/dodecan/.test(z)) { lvl = 3; why = "Dodecaneso: Meltemi presente ma più regolare; tratte lunghe, meglio equipaggio esperto."; }
  else if (/grenadin|carib|cuba/.test(z)) { lvl = 3; why = "Caraibi: alisei costanti 10-20 nodi da est, ma passaggi lunghi ed esposti tra le isole."; }
  else if (/sporad/.test(z)) { lvl = 2; why = "Sporadi: Meltemi più debole (forza 3-4), ma i canali a nord possono rinforzare."; }
  else if (/balear/.test(z)) { lvl = 2; why = "Baleari: venti termici moderati e qualche Tramontana; condizioni gestibili."; }
  else if (/inner island|seychell/.test(z)) { lvl = 2; why = "Seychelles: distanze brevi e venti prevedibili, ma pochi porti — si vive sull'ancora."; }
  else if (/egadi|sicil/.test(z)) { lvl = sep ? 1 : 2; why = sep ? "Egadi a settembre: condizioni tranquille e calde." : "Egadi/Sicilia in estate: venti moderati, qualche Scirocco o Maestrale."; }
  else if (/ionian/.test(z)) { lvl = 1; why = "Ionio: la zona più calma della Grecia — Maistro leggero e mare piatto. Ideale per iniziare."; }
  else if (/croaz/.test(z)) { lvl = 1; why = "Croazia: acque riparate, venti regolari e baie vicine. Perfetta per i principianti."; }
  else { lvl = 2; why = "Condizioni mediterranee tipiche."; }
  return { ...DIFF[lvl], why };
}

function tripPage(t, all) {
  const idx = all.findIndex(x => x.id === t.id);
  const prev = all[idx - 1], next = all[idx + 1];
  const zone = cleanZone(t.zone);
  const cat = /Lagoon|Bali|Fountain|Pajot/i.test(t.boat) ? "catamarano" : "monoscafo";
  const avg = t.days ? Math.round(t.nm / t.days) : null;
  const pc = pace(avg), df = diffOf(t.zone, t.month);
  // lo skipper è a bordo di ogni viaggio (è il suo diario di rotta): lo aggiungiamo in testa
  const crewAll = t.crew.some(n => normName(n) === "edoc") ? t.crew : ["Edo C", ...t.crew];
  const crew = crewAll.map(n => crewChip(n, t.year)).join("");
  const galId = "g_" + t.id.replace(/-/g, "_");   // niente trattini: window.g_all_in valido (non g_all-in)
  const gal = t.photos && t.photos.length
    ? `<div class="gal">${t.photos.map((p, i) => `<img src="${p.src}" alt="${esc(zone)} ${t.year}" loading="lazy" onclick="openLB(window.${galId},${i})">`).join("")}</div>`
    : `<div class="noph">Nessuna foto per questo viaggio… ancora. 📷</div>`;
  window[galId] = (t.photos || []).map(p => ({ src: p.src, people: p.people || [] }));
  return `
  <div class="vhero">
    <div class="yr">${MONTHS[t.month] || ""} ${t.year}</div>
    <h1>${flags(t.country)} ${esc(zone)}</h1>
    <div class="sub"><b>«${esc(t.name)}»</b> · ${esc(t.boat)} · ${cat} · ${countryLinks(t.country)}</div>
    <div class="vstats">
      <div class="vstat"><b>${t.nm}</b><i>miglia</i></div>
      <div class="vstat"><b>${Math.round(t.days)}</b><i>giorni</i></div>
      <div class="vstat"><b>${avg ?? "—"}</b><i>nm/giorno</i></div>
      <div class="vstat"><b>${crewAll.length}</b><i>equipaggio</i></div>
      <div class="vstat"><b>${t.n_photos || 0}</b><i>foto</i></div>
    </div>
    <div class="vtags">${boatIcon(t.boat)}${pc ? `<span class="pace ${pc.k}" title="${esc(pc.d)}">${pc.t}</span>` : ""}<span class="diff ${df.k}" title="${esc(df.why)}">⚓ ${df.t}</span></div>
  </div>
  <section>
    ${ROUTE[t.id] ? `<h2>🗺️ La rotta</h2><img class="route" src="trips/routes/${ROUTE[t.id]}.png" alt="Rotta ${esc(zone)} ${t.year}" loading="lazy" onclick="openLB([{src:'trips/routes/${ROUTE[t.id]}.png',people:[]}],0)">` : ""}
    ${t.story ? `<h2>📖 ${esc(t.story.title || "Il racconto")}</h2><div class="story">${t.story.html}</div>` : ""}
    <h2>📸 Foto del viaggio</h2>
    ${gal}
    <h2>⚓ L'equipaggio di quell'anno</h2>
    <div class="crewgrid">${crew || "<span class='noph'>Equipaggio non disponibile.</span>"}</div>
    ${t.fleet && t.fleet.length ? `<h2>🚩 In flotta</h2>${t.fleet.map(f => `<div class="fleetnote">${f.boat_name ? `«${esc(f.boat_name)}» · ` : ""}${esc(f.note || "Altra barca al seguito")} &mdash; non equipaggio della «${esc(t.name)}»</div><div class="crewgrid">${(f.people || []).map(crewChipById).filter(Boolean).join("")}</div>`).join("")}` : ""}
    ${ANEC.filter(a => a.trip_id === t.id).length ? `<h2>📖 Aneddoti di questo viaggio</h2>
    <div class="chips">${ANEC.filter(a => a.trip_id === t.id).map(a => `<a class="chip lk" href="aneddoti.html#${a.id}">${a.kind === "eroico" ? "🎖️" : "⚓"} ${esc(a.title)}</a>`).join("")}</div>` : ""}
    <div class="nav2">
      ${prev ? `<a href="#${prev.id}"><small>‹ ${prev.year}</small>${flags(prev.country)}${esc(cleanZone(prev.zone))}${prev.name ? ` · «${esc(prev.name)}»` : ""}</a>` : "<span></span>"}
      ${next ? `<a class="next" href="#${next.id}"><small>${next.year} ›</small>${flags(next.country)}${esc(cleanZone(next.zone))}${next.name ? ` · «${esc(next.name)}»` : ""}</a>` : "<span></span>"}
    </div>
  </section>
  <footer><a class="pl" href="index.html">‹ Torna alla Plancia Niña</a></footer>`;
}

function directory(all) {
  const byYear = [...all].sort((a, b) => b.year - a.year || monthIdx(b.month) - monthIdx(a.month));
  const cards = byYear.map(t => {
    const zone = cleanZone(t.zone);
    const ph = t.photos && t.photos.length
      ? `<img class="ph" src="${t.photos[0].src}" alt="${esc(zone)}" loading="lazy">`
      : ROUTE[t.id]
        ? `<img class="ph rt" src="trips/routes/${ROUTE[t.id]}.png" alt="Rotta ${esc(zone)}" loading="lazy">`
        : `<div class="ph none">${flags(t.country) || "⛵"}</div>`;
    return `<a class="tcard" href="#${t.id}">${ph}<div class="b"><b>${flags(t.country)} ${esc(zone)}</b>
      <span>${t.name ? `«${esc(t.name)}» · ` : ""}${esc(t.boat || "")}</span><br>
      <span>${t.year} · ${t.nm} nm</span>${t.n_photos ? `<br><span class="pc">📷 ${t.n_photos} foto</span>` : ""}</div></a>`;
  }).join("");
  const withPh = all.filter(t => t.n_photos).length;
  return `<div class="vhero"><div class="yr">Archivio · 2011–2024</div>
    <h1>I viaggi</h1><div class="sub">25 crociere in 14 stagioni. ${withPh} con foto — le altre arriveranno.</div></div>
    <section>
    <h2>🌍 Tutte le rotte · 2011–2024</h2>
    <img class="route gmap" src="trips/routes/_global.png" alt="Tutte le rotte 2011–2024 · Mediterraneo, Cuba, Piccole Antille" loading="lazy" onclick="openLB([{src:'trips/routes/_global.png',people:[]}],0)">
    <div class="gcap">Le aree navigate: Mediterraneo · Caraibi (Cuba, Piccole Antille) · Oceano Indiano (Seychelles). Tocca per ingrandire.</div>
    <div class="grid" style="margin-top:1.4rem">${cards}</div>
    <footer><a class="pl" href="index.html">‹ Torna alla Plancia Niña</a></footer></section>`;
}

let DATA = [], ANEC = [];
function route() {
  const id = decodeURIComponent(location.hash.replace(/^#/, ""));
  const t = DATA.find(x => x.id === id);
  document.getElementById("app").innerHTML = t ? tripPage(t, DATA) : directory(DATA);
  window.scrollTo(0, 0);
}
window.addEventListener("hashchange", () => { document.getElementById("lb").classList.remove("on"); route(); });
Promise.all([
  fetch("data/trips.json", { cache: "no-cache" }).then(r => r.json()),
  fetch("data/crew.json", { cache: "no-cache" }).then(r => r.json()).catch(() => ({ people: [] })),
  fetch("data/anecdotes.json", { cache: "no-cache" }).then(r => r.json()).catch(() => ({ anecdotes: [] })),
]).then(([d, dc, da]) => {
  buildCrewMap(dc.people || []);
  ANEC = da.anecdotes || [];
  DATA = (d.trips || []).slice().sort((a, b) => a.year - b.year || monthIdx(a.month) - monthIdx(b.month));
  route();
}).catch(() => { document.getElementById("app").innerHTML = `<section><p style="padding:2rem 0">Viaggi non disponibili offline.</p></section>`; });
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
</script>
<script src="nav.js"></script>
</body>
