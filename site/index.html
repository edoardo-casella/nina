<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Plancia Niña — live</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#FFFFFF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Condensed:wght@600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  /* GIORNO (default): leggibile in pieno sole — carta bianca, inchiostro nero,
     testi secondari scuriti apposta. Come il day-mode dei plotter nautici. */
  --paper:#FBFDFF; --sea-1:#EEF4F9; --sea-2:#D8E4EE; --land:#F7EDD2;
  --ink:#0B1320; --soft:#3E556B; --hair:#C4D2DF; --accent:#006B9F;
  --magenta:#C2185B; --verde:#0A7A43; --giallo:#A86400; --rosso:#C22030;
  --hdr:#FFFFFF; --hdrtext:#0B1320; --hdrsub:#3E556B; --stale:#C2185B;
  --warmtx:#6A4E0E; --chiptx:#FFFFFF;
  --display:"IBM Plex Sans Condensed",system-ui,sans-serif;
  --body:"IBM Plex Sans",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
html[data-theme="dark"]{
  /* NOTTE: console navale — non brucia la visione notturna in rada */
  --paper:#0A1424; --sea-1:#101E33; --sea-2:#1C3552; --land:#2C2410;
  --ink:#DCE7F5; --soft:#7E95B0; --hair:#22384F; --accent:#35C4E7;
  --magenta:#E8536F; --verde:#2FBF71; --giallo:#E8A33D; --rosso:#E8536F;
  --hdr:#060D18; --hdrtext:#DCE7F5; --hdrsub:#7FA6B5; --stale:#FF9BD6;
  --warmtx:#FFC97A; --chiptx:#062330;
}
*{box-sizing:border-box;margin:0}
body{background:var(--paper);color:var(--ink);font:400 16px/1.5 var(--body);
  -webkit-font-smoothing:antialiased;padding-bottom:4rem}
main{max-width:640px;margin:0 auto;padding:0 1.1rem}

/* convenzione cartografica: corsivo = acqua, tondo = terra */
.water{font-style:italic}

h2{font:700 .72rem/1 var(--display);letter-spacing:.18em;text-transform:uppercase;
  color:var(--soft);margin:2.4rem 0 .85rem;display:flex;align-items:baseline;gap:.6rem;
  border-left:3px solid var(--accent);padding-left:.55rem}
h2::after{content:"";flex:1;height:1px;background:var(--hair)}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}

header{background:var(--hdr);color:var(--hdrtext);position:sticky;top:0;z-index:10;
  border-bottom:2px solid var(--accent)}
.hdr{max-width:640px;margin:0 auto;padding:.7rem 1.1rem;display:flex;align-items:center;gap:.7rem}
.boat{font:700 1.05rem/1 var(--display);letter-spacing:.14em;text-transform:uppercase;
  color:var(--hdrtext);text-decoration:none;border-bottom:1px dotted currentColor}
.cap{font:600 .6rem/1.3 var(--display);letter-spacing:.1em;text-transform:uppercase;color:var(--hdrsub);margin-top:.22rem}
.theme{font:700 .58rem/1 var(--display);letter-spacing:.1em;padding:.4rem .55rem;margin-left:.6rem;
  border:1px solid var(--hair);border-radius:3px;background:transparent;color:var(--hdrtext);cursor:pointer;flex:none}
.clock{font:600 .74rem/1.3 var(--mono);color:var(--accent);margin-top:.2rem;font-variant-numeric:tabular-nums}
.live{font:700 .58rem/1 var(--display);letter-spacing:.12em;margin-left:.55rem;vertical-align:middle}
.live.on{color:var(--verde)} .live.off{color:var(--soft)}
.live.on::before{content:"●";margin-right:.25rem;animation:pulse 2s infinite}
.live.off::before{content:"●";margin-right:.25rem}
@keyframes pulse{50%{opacity:.35}}
.when{font-family:var(--mono);font-size:.78rem;color:var(--soft);margin-left:auto;text-align:right;flex:none}
.stale{color:var(--stale)}

.flag{background:var(--magenta);color:#fff;padding:.65rem 1.1rem;font:600 .8rem/1.35 var(--body)}
.flag b{font:700 .72rem/1 var(--display);letter-spacing:.14em;display:block;margin-bottom:.15rem}
.flag.ok{background:var(--verde)}
.flag.sim{background:var(--land);color:var(--warmtx)}

.count{background:var(--sea-1);border:1px solid var(--hair);border-left:3px solid var(--accent);
  border-radius:3px;padding:.85rem 1rem;margin-top:1.1rem;display:flex;align-items:baseline;
  gap:1rem;flex-wrap:wrap}
.count b{font:700 1.5rem/1 var(--mono);font-variant-numeric:tabular-nums;color:var(--ink)}
.count i{font:700 .6rem/1 var(--display);letter-spacing:.14em;text-transform:uppercase;
  color:var(--soft);font-style:normal;display:block;margin-top:.25rem}
.count .lbl{font:700 .68rem/1.4 var(--display);letter-spacing:.14em;text-transform:uppercase;
  color:var(--accent);flex-basis:100%}
.crew-cta{display:flex;align-items:center;justify-content:center;gap:.5rem;
  margin-top:.7rem;padding:.8rem 1rem;background:var(--accent);color:var(--chiptx);
  font:700 .74rem/1 var(--display);letter-spacing:.12em;text-transform:uppercase;
  text-decoration:none;border-radius:3px}

.nowbar{display:flex;flex-wrap:wrap;gap:.4rem .95rem;font-size:.85rem;color:var(--soft);
  margin:1rem 0 .9rem;align-items:baseline}
.nowbar b{font:600 .95rem/1 var(--mono);color:var(--ink);font-variant-numeric:tabular-nums}

.vals span{color:var(--ink);font-weight:600}

.dayrow{display:flex;gap:.85rem;padding:.85rem 0;border-bottom:1px solid var(--hair);align-items:flex-start}
.dayrow:last-child{border-bottom:0}
.dayrow em{flex:none;width:3.2rem;font:700 .66rem/1.35 var(--display);letter-spacing:.08em;
  text-transform:uppercase;color:var(--soft);font-style:normal;padding-top:.15rem}
.dayrow h3{font:400 .98rem/1.3 var(--body)}
.dayrow p{font-size:.8rem;color:var(--soft);margin-top:.22rem;line-height:1.45}
.badge{font:700 .58rem/1 var(--display);letter-spacing:.1em;padding:.18rem .45rem;border-radius:3px;
  color:#fff;display:inline-block;margin-right:.2rem}
.badge.sail{background:var(--verde)} .badge.motor{background:var(--giallo)}
.badge.night{background:#3D5A9E}
.nightline{margin:.1rem 0 .8rem;font-size:.82rem;color:var(--soft)}

.hr.day0{border-left:1px solid var(--soft);margin-left:2px;padding-left:2px}
.axis .d0{font-weight:700;color:var(--ink);overflow:visible;white-space:nowrap}
.sky b{font:600 .6rem/1 var(--mono);color:var(--ink)}

.tabs{display:flex;gap:.4rem;margin-bottom:.6rem}
.tab{font:700 .64rem/1 var(--display);letter-spacing:.1em;text-transform:uppercase;
  padding:.4rem .75rem;border:1px solid var(--hair);background:var(--paper);
  border-radius:3px;color:var(--soft);cursor:pointer}
.tab.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* drill-down: quattro viste in una pagina, hash-router senza framework */
header .tabs{max-width:640px;margin:0 auto;padding:0 1.1rem .6rem}
header .tab{flex:1;text-align:center;text-decoration:none}
main>section{display:none}
main>section.on{display:block}

.exec{background:var(--sea-1);border:1px solid var(--hair);border-left:3px solid var(--accent);
  border-radius:3px;padding:.95rem 1.05rem;font-size:.95rem;line-height:1.65}
.exec .dot{display:inline-block;width:10px;height:10px;margin:0 0 -1px 0}
.vflag{color:var(--magenta);font-weight:600}
.tl em{width:4.8rem}

.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
.pgrid .day{display:flex;flex-direction:column;gap:.18rem}
.pgrid .day span{font-size:.72rem}
.day.piena{border-top-color:var(--accent)}
.day.degradata{border-top-color:var(--giallo)}
.day.programma{border-top-color:var(--hair);opacity:.62}

.hr.wide{width:34px}
.hr.wide svg{width:13px;height:13px}
.axis.wide span{width:34px}
.hr.dim{opacity:.55}
.strip.sst{height:auto;align-items:center;padding:.3rem 0}
.strip.sst .hr{justify-content:center;gap:.3rem}
.sstv{font:700 .95rem/1 var(--mono);font-variant-numeric:tabular-nums}
.strip.sst em{font:400 .56rem/1 var(--mono);color:var(--soft);font-style:normal}

/* voti (stima) e foto delle destinazioni */
.stars{color:var(--giallo);font-size:.8rem;letter-spacing:.04em;white-space:nowrap;font-style:normal}
.stars .off{opacity:.28}
.thumb{width:56px;height:56px;object-fit:cover;border-radius:3px;flex:none;
  border:1px solid var(--hair)}
.dayrow .thumb{margin-left:auto}
.dests{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-top:.6rem}
.dest{border:1px solid var(--hair);border-radius:3px;overflow:hidden;background:var(--sea-1)}
.dphoto{width:100%;height:110px;object-fit:cover;display:block}
.dphoto.none{display:flex;align-items:center;justify-content:center;height:110px;
  background:var(--sea-2);color:var(--soft);font-size:1.5rem}
.dest .dbody{padding:.5rem .6rem}
.dest h3{font:400 .92rem/1.25 var(--body)}
.dest .dbody p{font-size:.72rem;color:var(--soft);margin-top:.25rem;display:-webkit-box;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.dest{cursor:pointer}
a.dl{color:inherit;text-decoration:none;border-bottom:1px dotted var(--accent);cursor:pointer}

/* scheda destinazione: overlay modale */
.modal{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal[hidden]{display:none}
.modal .back{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px)}
.sheet{position:relative;background:var(--paper);width:100%;max-width:640px;max-height:92vh;
  overflow-y:auto;border-radius:14px 14px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.4);
  animation:slideup .28s cubic-bezier(.2,.7,.2,1)}
@keyframes slideup{from{transform:translateY(100%)}}
@media(min-width:680px){.modal{align-items:center}.sheet{border-radius:14px;animation:none}}
.sheet-x{position:sticky;top:0;float:right;margin:.5rem .6rem 0 0;z-index:2;width:2rem;height:2rem;
  border:0;border-radius:50%;background:var(--sea-2);color:var(--ink);font:700 1.1rem/1 var(--body);cursor:pointer}
.sheet-in{padding:1.1rem 1.2rem 2rem}
.sheet h2{margin-top:1.5rem}
.sheet h1{font:400 1.5rem/1.2 var(--body);font-style:italic;padding-right:2.4rem}
.sheet .sub{display:flex;gap:.7rem;align-items:center;flex-wrap:wrap;margin:.35rem 0 .2rem;
  font:700 .62rem/1 var(--display);letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
.gal{display:flex;gap:.5rem;overflow-x:auto;scroll-snap-type:x mandatory;margin:.9rem -1.2rem 0;
  padding:0 1.2rem .4rem;scrollbar-width:thin}
.gal a{flex:none;scroll-snap-align:start}
.gal img{height:190px;width:auto;border-radius:5px;display:block;border:1px solid var(--hair)}
.storia{font-size:.95rem;line-height:1.62;color:var(--ink)}
.storia .src{display:block;margin-top:.5rem;font-size:.76rem;color:var(--soft)}
.linkrow{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.6rem}
.linkrow a{font:600 .82rem/1 var(--body);padding:.55rem .8rem;border:1px solid var(--hair);
  border-radius:99px;color:var(--accent);text-decoration:none;background:var(--sea-1)}

.leg{background:var(--sea-1);border:1px solid var(--hair);border-radius:3px;padding:1.05rem 1.1rem}
.route{font:1.35rem/1.25 var(--body);font-style:italic;margin-bottom:.7rem}
.route span{color:var(--soft);font-style:normal;padding:0 .25rem}
.facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(74px,1fr));gap:.9rem .7rem;
  border-top:1px solid var(--hair);padding-top:.8rem}
.fact b{display:block;font:600 1.15rem/1 var(--mono);font-variant-numeric:tabular-nums}
.fact i{display:block;font:400 .64rem/1.3 var(--display);letter-spacing:.1em;text-transform:uppercase;
  color:var(--soft);font-style:normal;margin-top:.28rem}

.score{margin-top:.95rem}
.bar{height:7px;background:var(--sea-2);border-radius:4px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:4px;transition:width .9s cubic-bezier(.2,.7,.2,1)}
.score p{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.35rem;
  font-size:.85rem;color:var(--soft)}
.score p b{font:700 .8rem/1 var(--display);letter-spacing:.1em}

/* firma: la fascia del vento */
.ribbon{margin:0 -1.1rem;padding:0 1.1rem;overflow-x:auto;overscroll-behavior-x:contain;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ribbon::-webkit-scrollbar{display:none}
.strip{display:flex;gap:2px;align-items:flex-end;height:132px;position:relative;width:max-content}
.hr{width:15px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px;position:relative}
.hr .col{width:100%;background:var(--sea-2);border-radius:1px 1px 0 0;
  transform-origin:bottom;animation:rise .6s cubic-bezier(.2,.7,.2,1) backwards}
.hr.strong .col{background:#7FB0C1}
.hr.gale .col{background:var(--magenta)}
.hr svg{width:11px;height:11px;color:var(--soft);flex:none}
.hr.now::before{content:"";position:absolute;top:-8px;bottom:-16px;left:50%;width:1px;background:var(--magenta)}
@keyframes rise{from{transform:scaleY(0)}}
.axis{display:flex;gap:2px;width:max-content;margin-top:.35rem}
.axis span{width:15px;text-align:center;font:400 .58rem/1 var(--mono);color:var(--soft)}
.legend{display:flex;gap:1.1rem;margin-top:.6rem;font-size:.72rem;color:var(--soft)}
.legend b{font-family:var(--mono);color:var(--ink);font-weight:600}

.sky{display:flex;gap:2px;width:max-content;padding:.2rem 0}
.sky span{width:49px;display:flex;flex-direction:column;align-items:center;gap:.18rem;font-size:1.15rem}
.sky em{font:400 .58rem/1 var(--mono);color:var(--soft);font-style:normal}

.rada{display:flex;gap:.8rem;align-items:flex-start;padding:.9rem 0;border-bottom:1px solid var(--hair)}
.rada:last-child{border-bottom:0}
.dot{width:13px;height:13px;border-radius:50%;flex:none;margin-top:.32rem}
.dot.verde{background:var(--verde)} .dot.giallo{background:var(--giallo)} .dot.rosso{background:var(--rosso)}
.rada h3{font:400 1.05rem/1.3 var(--body);font-style:italic}
.rada p{font-size:.83rem;color:var(--soft);margin-top:.15rem}
.rada .pts{margin-left:auto;font:600 1rem/1 var(--mono);color:var(--soft)}
.b-plan{background:var(--land);border-radius:3px;padding:.75rem .9rem;margin-top:.9rem;font-size:.88rem}
.b-plan b{font:700 .66rem/1 var(--display);letter-spacing:.12em;text-transform:uppercase;
  display:block;color:var(--warmtx);margin-bottom:.22rem}

.days{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem}
.day{border:1px solid var(--hair);border-radius:3px;padding:.7rem .6rem;border-top:3px solid var(--hair)}
.day.verde{border-top-color:var(--verde)} .day.giallo{border-top-color:var(--giallo)} .day.rosso{border-top-color:var(--rosso)}
.day em{display:block;font:400 .64rem/1 var(--display);letter-spacing:.1em;text-transform:uppercase;
  color:var(--soft);font-style:normal}
.day strong{display:block;font:600 1.25rem/1.2 var(--mono);margin:.3rem 0}
.day span{font-size:.75rem;font-style:italic;color:var(--soft);display:block;line-height:1.3}

.crew{display:flex;flex-wrap:wrap;gap:.4rem}
.chip{border:1px solid var(--hair);border-radius:99px;padding:.28rem .75rem;font-size:.82rem;
  background:var(--sea-1);color:var(--ink);font-family:var(--body);cursor:pointer}
.chip.skipper{background:var(--accent);color:var(--chiptx);border-color:var(--accent);font-weight:600}
.crewcard{background:var(--sea-1);border:1px solid var(--hair);border-left:3px solid var(--accent);
  border-radius:3px;padding:.7rem .9rem;margin-top:.6rem;font-size:.85rem;line-height:1.7;color:var(--soft)}
.crewcard b{color:var(--ink)}
.hint{font-size:.78rem;color:var(--soft);margin:-.35rem 0 .7rem}
.turns{margin-top:.9rem;display:grid;gap:.15rem}
.turn{font-size:.88rem;border-bottom:1px dotted var(--hair)}
.turn summary{display:flex;justify-content:space-between;padding:.45rem 0;cursor:pointer;list-style:none}
.turn summary::-webkit-details-marker{display:none}
.turn p{font-size:.78rem;color:var(--soft);padding:0 0 .55rem}
.turn em{font-style:normal;color:var(--soft);font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;
  font-family:var(--display);font-weight:700}
.pwarn{margin-top:.7rem;font-size:.76rem;color:var(--warmtx);font-weight:600}

table{width:100%;border-collapse:collapse;font-size:.88rem}
th{font:700 .62rem/1 var(--display);letter-spacing:.1em;text-transform:uppercase;color:var(--soft);
  text-align:right;padding:.4rem 0;border-bottom:1px solid var(--hair)}
th:first-child{text-align:left}
td{padding:.44rem 0;border-bottom:1px solid var(--hair);text-align:right;font-family:var(--mono);
  font-variant-numeric:tabular-nums}
td:first-child{text-align:left;font-family:var(--body)}
details summary{cursor:pointer;color:var(--soft);font-size:.85rem;padding:.5rem 0}

footer{max-width:640px;margin:3rem auto 0;padding:1.2rem 1.1rem;border-top:1px solid var(--hair);
  font-size:.76rem;color:var(--soft);line-height:1.6}
footer a{color:var(--magenta)}
footer strong{color:var(--ink)}
.poweredby{display:inline-flex;align-items:center;gap:.4rem;vertical-align:middle;font-size:.82rem}
.starlink{display:inline-flex;align-items:center;gap:.34rem;font:700 .96rem/1 var(--display);
  letter-spacing:.16em;text-transform:uppercase;color:var(--ink)}
.starlink svg{width:15px;height:15px;color:var(--accent);flex:none}
.err{background:var(--land);padding:1rem;border-radius:3px;margin-top:1.5rem;font-size:.9rem}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header><div class="hdr">
  <div><a class="boat" id="boat" href="barca.html" title="La barca — Dufour 48 Catamaran">Niña</a><span class="live" id="live"></span>
  <div class="cap" id="captains"></div>
  <div class="clock" id="clock"></div></div>
  <span class="when" id="when">carico…</span>
  <button class="theme" id="themeBtn" onclick="cycleTheme()" title="Tema: auto segue alba e tramonto">AUTO</button>
</div>
<nav class="tabs" id="mainnav">
  <a class="tab on" id="nav-oggi" href="#oggi">Oggi</a>
  <a class="tab" id="nav-vento" href="#vento">Vento</a>
  <a class="tab" id="nav-mare" href="#mare">Mare</a>
  <a class="tab" id="nav-programma" href="#programma">Programma</a>
</nav></header>

<div id="flag"></div>
<main id="app"></main>

<div id="scheda" class="modal" hidden>
  <div class="back" onclick="history.back()"></div>
  <div class="sheet"><button class="sheet-x" onclick="history.back()" aria-label="chiudi">✕</button>
    <div class="sheet-in" id="scheda-in"></div></div>
</div>

<footer>
  Vento e onda: <strong>Open-Meteo</strong> (modello ECMWF). Bollettino ufficiale del mare: <a href="https://www.meteoam.it/it/mare" target="_blank" rel="noopener">Aeronautica Militare</a>.<br><br>
  <span class="poweredby">powered by <span class="starlink"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><ellipse cx="12" cy="12" rx="10.5" ry="4.4" transform="rotate(-28 12 12)"/><circle cx="12" cy="12" r="2.6" fill="currentColor" stroke="none"/></svg>Starlink</span></span> — internet satellitare a bordo, anche al largo<br><br>

</footer>

<script>
const $ = (h) => { const d = document.createElement("div"); d.innerHTML = h.trim(); return d.firstChild; };
const esc = (s) => String(s ?? "").replace(/[<>&]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
const ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 19V5M12 19l-5-5M12 19l5-5"/></svg>';

function ago(iso) {
  const h = (Date.now() - new Date(iso)) / 36e5;
  if (h < 1) return { txt: "aggiornato ora", stale: false };
  if (h < 24) return { txt: `aggiornato ${Math.round(h)} h fa`, stale: h > 12 };
  return { txt: `aggiornato ${Math.round(h / 24)} g fa`, stale: true };
}

const dayLbl = iso => new Date(iso).toLocaleDateString("it", { weekday: "short", day: "numeric" });
const hourAxis = hours => hours.map((h, i) => {
  const hh = h.time.slice(11, 13);
  return hh === "00" ? `<span class="d0">${dayLbl(h.time)}</span>` : `<span>${i % 3 === 0 ? hh : ""}</span>`;
}).join("");

function ribbon(hours) {
  const now = Date.now();
  const max = Math.max(22, ...hours.map(h => h.gust ?? h.tws));
  const cols = hours.map((h, i) => {
    const t = new Date(h.time), kn = h.tws, f = bft(kn);
    const near = Math.abs(t - now) < 18e5 ? " now" : "";
    const mid = h.time.slice(11, 16) === "00:00" ? " day0" : "";
    const px = Math.max(4, Math.round(kn / max * 96));
    // la freccia punta DOVE VA il vento: direzione di provenienza + 180°
    return `<div class="hr${near}${mid}" title="${dayLbl(h.time)} ${h.time.slice(11, 16)} — ${Math.round(kn)} kn da ${comp(h.twd)} · F${f} ${BFT_NAME[f]} · raffiche ${Math.round(h.gust)}">
      <span style="transform:rotate(${(h.twd + 180) % 360}deg);display:flex">${ARROW}</span>
      <div class="col" style="height:${px}px;background:${SCALE_COL[f]};animation-delay:${Math.min(i * 12, 600)}ms"></div>
    </div>`;
  }).join("");
  const vals = hours.map((h, i) => `<span>${i % 3 === 0 ? Math.round(h.tws) : ""}</span>`).join("");
  const fmax = bft(max);
  return `<div class="ribbon"><div class="strip">${cols}</div>
    <div class="axis vals">${vals}</div><div class="axis">${hourAxis(hours)}</div></div>
    <div class="legend"><span class="water">max <b>${Math.round(max)} kn · F${fmax}</b> (${BFT_NAME[fmax]})</span>
    <span>${[2, 3, 4, 5, 6, 7].map(f => `<b style="color:${SCALE_COL[f]}">F${f}</b>`).join(" ")}</span>
    <span>nodi sopra, ora sotto · tocca una barra</span></div>`;
}

function windyMap(pos, ov, title) {
  if (!navigator.onLine || !pos || pos.lat == null) return "";
  const src = `https://embed.windy.com/embed2.html?lat=${pos.lat}&lon=${pos.lon}&detailLat=${pos.lat}&detailLon=${pos.lon}&zoom=8&level=surface&overlay=${ov}&menu=&message=true&marker=true&calendar=now&type=map&location=coordinates&metricWind=kt&metricTemp=%C2%B0C`;
  return `<h2>${title}</h2>
  <div style="border:1px solid var(--hair);border-radius:3px;overflow:hidden">
    <iframe src="${src}" style="width:100%;height:420px;border:0;display:block" loading="lazy" title="${title}"></iframe>
  </div>
  <p style="margin-top:.5rem;font-size:.76rem;color:var(--soft)">
    Windy centrato su ${esc(pos.name)} — trascina la barra del tempo in basso per vedere il trend.</p>`;
}

const wmoIcon = c => c == null ? "·" : c === 0 ? "☀️" : c <= 2 ? "🌤️" : c === 3 ? "☁️" :
  c <= 49 ? "🌫️" : c <= 57 ? "🌦️" : c <= 67 ? "🌧️" : c <= 79 ? "🌨️" : c <= 82 ? "🌧️" : "⛈️";
const comp = d => ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSO","SO","OSO","O","ONO","NO","NNO"][Math.round(d / 22.5) % 16];

// scala Beaufort (nodi) e stato del mare Douglas (metri): colori condivisi
const BFT_MAX = [1, 3, 6, 10, 16, 21, 27, 33, 40, 47, 55, 63];
const bft = kn => { const i = BFT_MAX.findIndex(x => kn <= x); return i === -1 ? 12 : i; };
const BFT_NAME = ["calma", "bava di vento", "brezza leggera", "brezza tesa", "vento moderato",
  "vento teso", "vento fresco", "vento forte", "burrasca", "burrasca forte",
  "tempesta", "tempesta violenta", "uragano"];
const SCALE_COL = ["#4A6FA5", "#4A8FBF", "#38A3C4", "#37D07C", "#A8D34C", "#FFD54F",
  "#FFB454", "#FF8A3D", "#FF5A5A", "#E5484D", "#C13030", "#A02020", "#801515"];
const seaState = m => m <= 0.02 ? 0 : m <= 0.1 ? 1 : m <= 0.5 ? 2 : m <= 1.25 ? 3 :
  m <= 2.5 ? 4 : m <= 4 ? 5 : m <= 6 ? 6 : m <= 9 ? 7 : 8;
const SEA_NAME = ["calmo", "quasi calmo", "poco mosso", "mosso", "molto mosso",
  "agitato", "molto agitato", "grosso", "molto grosso"];

function waveRibbon(hours) {
  const has = hours.filter(h => h.wave != null);
  if (!has.length) return `<h2>Onda — 48 ore</h2>
    <p style="font-size:.85rem;color:var(--soft)">Dati onda non disponibili per questo punto.</p>`;
  const max = Math.max(1.2, ...has.map(h => h.wave));
  const cols = hours.map(h => {
    if (h.wave == null) return `<div class="hr"><span></span><div class="col" style="height:4px"></div></div>`;
    const st = seaState(h.wave);
    const mid = h.time.slice(11, 16) === "00:00" ? " day0" : "";
    const px = Math.max(4, Math.round(h.wave / max * 96));
    const rot = h.wave_dir != null
      ? `<span style="transform:rotate(${(h.wave_dir + 180) % 360}deg);display:flex">${ARROW}</span>` : "<span></span>";
    return `<div class="hr${mid}" title="${dayLbl(h.time)} ${h.time.slice(11, 16)} — onda ${h.wave.toFixed(1)} m${h.wave_dir != null ? " da " + comp(h.wave_dir) : ""} · mare ${st} (${SEA_NAME[st]})">${rot}<div class="col" style="height:${px}px;background:${SCALE_COL[st]}"></div></div>`;
  }).join("");
  const vals = hours.map((h, i) => `<span>${i % 3 === 0 && h.wave != null ? h.wave.toFixed(1).replace("0.", ".") : ""}</span>`).join("");
  const smax = seaState(max);
  return `<h2>Onda — 48 ore</h2>
    <div class="ribbon"><div class="strip">${cols}</div>
    <div class="axis vals">${vals}</div><div class="axis">${hourAxis(hours)}</div></div>
    <div class="legend"><span class="water">max <b>${max.toFixed(1)} m · mare ${smax}</b> (${SEA_NAME[smax]})</span>
    <span>freccia = dove va l'onda</span></div>`;
}

function skyStrip(hours) {
  const slots = [];
  for (let i = 0; i < hours.length; i += 3) {
    const h = hours[i];
    slots.push(`<span title="${dayLbl(h.time)} ${h.time.slice(11, 16)}">${wmoIcon(h.wmo)}<b>${h.temp != null ? Math.round(h.temp) + "°" : ""}</b><em>${h.time.slice(11, 13) === "00" ? dayLbl(h.time) : h.time.slice(11, 13)}</em></span>`);
  }
  return slots.length
    ? `<h2>Cielo e temperatura</h2><div class="ribbon"><div class="sky">${slots.join("")}</div></div>` : "";
}

function astroCard(astro, day) {
  if (!astro || !astro.length) return "";
  const t = astro.find(a => a.date === day) ?? astro[0];
  const next = astro.filter(a => a !== t && a.emoji).slice(0, 3).map(a =>
    `${a.emoji} ${new Date(a.date + "T12:00").toLocaleDateString("it", { weekday: "short" })}`).join(" · ");
  return `<h2>Sole e luna</h2>
  <div class="leg"><div class="facts">
    <div class="fact"><b>${esc(t.sunrise ?? "—")}</b><i>alba${t.sunrise_az != null ? " · " + comp(t.sunrise_az) : ""}</i></div>
    <div class="fact"><b>${esc(t.sunset ?? "—")}</b><i>tramonto${t.sunset_az != null ? " · " + comp(t.sunset_az) : ""}</i></div>
    <div class="fact"><b>${esc(t.moonrise ?? "—")}</b><i>sorge luna${t.moonrise_az != null ? " · " + comp(t.moonrise_az) : ""}</i></div>
    <div class="fact"><b>${esc(t.moonset ?? "—")}</b><i>cala luna${t.moonset_az != null ? " · " + comp(t.moonset_az) : ""}</i></div>
    <div class="fact"><b>${t.emoji ?? "—"}${t.illum_pct != null ? " " + t.illum_pct + "%" : ""}</b><i>${esc(t.name ?? "fase n/d")}</i></div>
  </div>
  ${next ? `<p style="margin-top:.7rem;font-size:.8rem;color:var(--soft)">Prossime notti: ${next}</p>` : ""}
  ${t.synthetic ? `<p style="margin-top:.4rem;font-size:.74rem;color:var(--magenta)">Dati astro sintetici (offline)</p>` : ""}</div>`;
}

function legCard(b) {
  if (b.rest) return `<div class="leg"><div class="route">Giornata di sosta</div>
    <p style="color:var(--soft);font-size:.9rem">Nessun trasferimento in programma. Bagno, riposo, cambusa.</p></div>`;
  if (!b.leg || !b.leg.leg) {
    // giorno di STOP: best_departure ritorna solo stub senza tratta.
    // Proprio quel giorno la pagina deve spiegare, non rompersi.
    const stop = b.stop_reason
      ? `<p style="color:var(--magenta);font-size:.9rem;margin-top:.4rem">${esc(b.stop_reason)}</p>` : "";
    return `<div class="leg"><div class="route">${b.stop_reason ? "Nessuna partenza consigliata" : "Nessuna tratta pianificata"}</div>${stop}</div>`;
  }
  const L = b.leg, [from, to] = L.leg.split(/ (?:->|→) /);
  const color = L.avg_score >= 70 ? "var(--verde)" : L.avg_score >= 45 ? "var(--giallo)" : "var(--rosso)";
  const verdict = L.avg_score >= 70 ? "Ottima" : L.avg_score >= 45 ? "Buona" : "Mediocre";
  const night = L.night ? `<p class="nightline">🌙 <b>NOTTURNA</b> — si salpa in serata, arrivo all'alba.
    ${L.night_check ? (L.night_check.ok
      ? `<b style="color:var(--verde)">Mare piatto confermato</b> (onda max ${L.night_check.max_wave} m ≤ ${L.night_check.thr})`
      : `<b style="color:var(--giallo)">Onda oltre soglia</b> (${L.night_check.max_wave} m > ${L.night_check.thr}): consigliato il piano diurno`) : ""}</p>` : "";
  return `<div class="leg">
    <div class="route">${esc(from)}<span>→</span>${esc(to)}</div>
    ${night}
    <div class="facts">
      <div class="fact"><b>${L.nm}</b><i>miglia</i></div>
      <div class="fact"><b>${String(L.cog).padStart(3, "0")}°</b><i>rotta vera</i></div>
      <div class="fact"><b>${L.depart.slice(11)}</b><i>salpa</i></div>
      <div class="fact"><b>${L.eta.slice(11)}</b><i>arrivo</i></div>
      <div class="fact"><b>${L.sail_pct}%</b><i>a vela</i></div>
      ${b.leg_sailing ? `<div class="fact"><b>${b.leg_sailing.vela ? "VELA" : "MOTORE"}</b><i>${esc(b.leg_sailing.andatura)} · TWA ${b.leg_sailing.twa}°</i></div>` : ""}
      ${b.leg_sailing?.avg_kn ? `<div class="fact"><b>${b.leg_sailing.avg_kn} kn</b><i>media barca</i></div>` : ""}
    </div>
    <div class="score">
      <p><span class="water">Sail Score</span><b style="color:${color}">${verdict} · ${L.avg_score}</b></p>
      <div class="bar"><i style="width:${L.avg_score}%;background:${color}"></i></div>
    </div>
    ${b.polar_estimated ? `<p class="pwarn">⚠ Velocità da polare STIMATA, non validata a bordo: considera ±20% finché non la misuriamo (step 5).</p>` : ""}</div>`;
}

function outlookRows(outlook) {
  if (!outlook || !outlook.length) return "<p style='color:var(--soft);font-size:.85rem'>Piano non ancora definito per i prossimi giorni.</p>";
  return outlook.map(o => {
    const wd = new Date(o.date + "T12:00").toLocaleDateString("it", { weekday: "short", day: "numeric" });
    const meteo = o.wx
      ? `${wmoIcon(o.wx.wmo)} ${Math.round(o.wx.tmin)}–${Math.round(o.wx.tmax)}° · pioggia ${o.wx.rain_prob ?? "—"}%${o.wx.rain_mm ? ` (${o.wx.rain_mm} mm)` : ""} · vento max ${Math.round(o.wx.wind_max)} kn da ${comp(o.wx.wind_dir)}${o.wx.synthetic ? " · sintetico" : ""}`
      : "meteo oltre l'orizzonte di previsione";
    if (o.rest) return `<div class="dayrow"><em>${wd}</em>
      <div><h3>Sosta — ${destLink(o.to, o.to_id)} ${stars(o.rating)}</h3><p>${meteo}</p></div>${thumb(o.photo, o.to)}</div>`;
    const s = o.sailing;
    const sail = s
      ? `<span class="badge ${s.vela ? "sail" : "motor"}">${s.vela ? "vela" : "motore"}</span> ${s.vela ? `${esc(s.andatura)} (TWA ~${s.twa}°) · ~${s.boat_kn} kn` : `${s.tws_est < 7 ? "vento debole" : "vento in prua"} (${s.tws_est} kn da ${comp(s.twd)}) · ~${s.boat_kn} kn a motore`}`
      : "";
    const nb = o.night ? `<span class="badge night">🌙 notturna</span> solo con mare ≤ 0,5 m · ` : "";
    return `<div class="dayrow"><em>${wd}</em>
      <div><h3 class="water">${esc(o.frm)} → ${destLink(o.to, o.to_id)} · <span class="num">${o.nm} nm</span>${o.night ? " 🌙" : ""} ${stars(o.rating)}</h3>
      ${sail || nb ? `<p>${nb}${sail}</p>` : ""}
      <p>${meteo}</p></div>${thumb(o.photo, o.to)}</div>`;
  }).join("");
}

const TURN_LABEL = {
  cucina_pranzo: "Cucina · pranzo", cucina_cena: "Cucina · cena",
  pulizie_pranzo: "Pulizie · pranzo", pulizie_cena: "Pulizie · cena",
  check_mattina: "Check barca · mattina", check_pomeriggio: "Check barca · pomeriggio",
};
const TURN_INFO = {
  cucina_pranzo: "Prepara il pranzo per tutti.",
  cucina_cena: "Prepara la cena per tutti.",
  pulizie_pranzo: "Sparecchia e lava dopo pranzo (pozzetto compreso).",
  pulizie_cena: "Sparecchia e lava dopo cena.",
  check_mattina: "Giro barca del mattino: oggetti al loro posto, cime chiare, niente in giro prima di salpare.",
  check_pomeriggio: "Giro barca del pomeriggio: riordino generale prima dell'ancoraggio e dell'aperitivo.",
};
const fmtD = d => d ? new Date(d + "T12:00").toLocaleDateString("it", { day: "numeric", month: "short" }) : "—";

function crewBlock(b) {
  if (!b.crew.length) return "";
  const chips = b.crew.map((m, i) =>
    `<button class="chip ${m.role === "skipper" ? "skipper" : ""}" onclick="toggleCrew(${i})">${esc(m.name)}</button>`).join("");
  const cards = b.crew.map((m, i) => {
    const turni = Object.entries(b.turns || {}).filter(([, v]) => v === m.name)
      .map(([k]) => TURN_LABEL[k] ?? k);
    const ruolo = m.role === "skipper" ? "skipper (esente dai turni)" : m.role;
    return `<div class="crewcard" id="crew-${i}" hidden>
      <b>${esc(m.name)}</b> — ${esc(ruolo)}${m.cabin ? ` · ${esc(m.cabin)}` : ""}<br>
      A bordo dal ${fmtD(m.board)} al ${fmtD(m.leave)}${turni.length ? `<br>Turni di oggi: <b>${turni.join(" + ")}</b>` : ""}</div>`;
  }).join("");
  const turns = Object.entries(b.turns || {}).filter(([, v]) => v).map(([k, v]) =>
    `<details class="turn"><summary><em>${TURN_LABEL[k] ?? k}</em><span>${esc(v)}</span></summary>
     <p>${TURN_INFO[k] ?? ""} La rotazione è automatica, un posto avanti ogni giorno — skipper esclusi.</p></details>`).join("");
  return `
  <h2>Equipaggio di giornata · ${b.crew.length} a bordo</h2>
  <p class="hint">Chi è in barca oggi (tocca un nome per la scheda). Sotto: i 6 turni di servizio del giorno — tocca per la spiegazione. Gli skipper non entrano in rotazione.</p>
  <div class="crew">${chips}</div>${cards}
  <div class="turns">${turns}</div>`;
}

function toggleCrew(i) {
  const t = document.getElementById("crew-" + i);
  if (!t) return;
  const wasHidden = t.hidden;
  document.querySelectorAll(".crewcard").forEach(el => { el.hidden = true; });
  t.hidden = !wasHidden;
}

// ---- giornata a tappe: rada mattina / pomeriggio / sera + attività
const ACT_ICON = { bagno: "🏊", trekking: "🥾", bordo: "⚓", porto: "🧭", cambusa: "🛒" };
const actLabels = a => (a || []).map(x => `${ACT_ICON[x] ?? "•"} ${x}`).join(" · ");

// voto 1-5 delle destinazioni
function stars(r) {
  if (r == null) return "";
  const full = Math.floor(r), half = r % 1 >= 0.5;
  return `<span class="stars" title="voto ${r}/5">${"★".repeat(full)}${half ? "½" : ""}<span class="off">${"★".repeat(5 - full - (half ? 1 : 0))}</span></span>`;
}
const thumb = (p, alt) => p?.src
  ? `<img class="thumb" loading="lazy" src="${p.src}" alt="${esc(alt ?? "")}" onerror="this.remove()">` : "";

function execCard(b, wx) {
  const steps = b.steps || [];
  const moves = steps.filter(s => !s.stay);
  const parts = [];
  if (b.rest) {
    parts.push(`<b>Giornata di sosta</b> a <span class="water">${esc(steps[0]?.name ?? b.position?.name ?? "—")}</span> — ${actLabels(steps[0]?.activity) || "bagno, riposo, cambusa"}.`);
  } else if (b.leg?.night) {
    const dest = b.leg.leg?.split(/ (?:->|→) /)[1] ?? "destinazione";
    parts.push(`<b>Notturna</b> 🌙 — si salpa in serata (~${b.leg.depart?.slice(11, 16) ?? "—"}), arrivo all'alba a <span class="water">${esc(dest)}</span>.`);
    if (b.leg.night_check) parts.push(b.leg.night_check.ok
      ? `Gate mare piatto: <b style="color:var(--verde)">ok</b> (onda max ${b.leg.night_check.max_wave} m).`
      : `Gate mare piatto: <b style="color:var(--giallo)">onda oltre soglia</b> (${b.leg.night_check.max_wave} m &gt; ${b.leg.night_check.thr}) — consigliato il piano diurno.`);
  } else if (moves.length) {
    const first = moves[0];
    const after = steps.slice(steps.indexOf(first) + 1).map(s =>
      `<span class="water">${esc(s.stay ? s.name : s.to)}</span>${s.activity?.length ? ` (${actLabels(s.activity)})` : ""}`);
    parts.push(`<b>${steps.length} tapp${steps.length === 1 ? "a" : "e"} · ${b.day_nm ?? first.nm} nm</b> — partenza ~${first.depart?.slice(11, 16) ?? "—"} da <span class="water">${esc(first.frm)}</span> verso <span class="water">${esc(first.to)}</span>${after.length ? `, poi ${after.join(", ")}` : ""}.`);
  } else if (b.stop_reason) {
    parts.push(`<b class="vflag">Nessuna partenza consigliata</b> — ${esc(b.stop_reason)}.`);
  } else {
    parts.push(`Nessuna tratta pianificata per oggi.`);
  }
  const rows = (wx?.hours || []).filter(h => h.time.startsWith(b.day));
  const dayRows = rows.filter(h => { const hh = +h.time.slice(11, 13); return hh >= 8 && hh <= 20; });
  const use = dayRows.length ? dayRows : rows;
  if (use.length) {
    const wm = use.reduce((a, h) => (h.tws > a.tws ? h : a));
    const wavem = Math.max(0, ...use.map(h => h.wave ?? 0));
    const sst = b.now?.sst;
    parts.push(`Vento fino a <b>${Math.round(wm.tws)} kn</b> da ${comp(wm.twd)} verso le ${wm.time.slice(11, 13)}${wavem ? `, onda max <b>${wavem.toFixed(1)} m</b>` : ""}${sst != null ? `, mare <b>${Math.round(sst)}°</b>` : ""}.`);
  }
  if (b.tonight && !b.leg?.night) parts.push(`Stanotte: <span class="water">${destLink(b.tonight.name, b.tonight.id)}</span> ${stars(b.tonight.rating)} <span class="dot ${b.tonight.light}"></span>.`);
  if (b.turns?.cucina_cena) parts.push(`Stasera in cucina: <b>${esc(b.turns.cucina_cena)}</b>.`);
  return `<h2>La giornata in breve</h2><div class="exec">${parts.join(" ")}</div>`;
}

function tappeTimeline(b) {
  const steps = b.steps || [];
  if (steps.length < 2) return "";
  const rows = steps.map(s => {
    const moon = s.night_stay ? " ⚓🌙" : "";
    const acts = actLabels(s.activity);
    if (s.stay) return `<div class="dayrow"><em>${esc(s.slot)}</em>
      <div><h3 class="water">${destLink(s.name, s.to_id)}${moon} ${stars(s.rating)}</h3>
      <p>in rada${acts ? " · " + acts : ""}</p></div>${thumb(s.photo, s.name)}</div>`;
    const plus = s.eta && s.depart && s.eta.slice(0, 10) !== s.depart.slice(0, 10) ? " +1" : "";
    const times = s.depart && s.eta ? `${s.depart.slice(11, 16)} → ${s.eta.slice(11, 16)}${plus}` : "";
    const badge = s.abort ? `<span class="badge" style="background:var(--rosso)">STOP</span>`
      : s.sail_pct != null ? `<span class="badge ${s.sail_pct >= 50 ? "sail" : "motor"}">${s.sail_pct >= 50 ? "vela" : "motore"}</span>` : "";
    return `<div class="dayrow"><em>${esc(s.slot)}</em>
      <div><h3 class="water">${esc(s.frm)} → ${destLink(s.to, s.to_id)}${moon} ${stars(s.rating)}</h3>
      <p><span class="num">${s.nm} nm</span>${times ? ` · ${times}` : ""}${s.arrive_by ? ` · entro ${esc(s.arrive_by)}` : ""} ${badge}${acts ? `<br>${acts}` : ""}${s.abort && s.reason ? `<br><span class="vflag">${esc(s.reason)}</span>` : ""}</p></div>${thumb(s.photo, s.to)}</div>`;
  }).join("");
  return `<h2>Le tappe di oggi · <span class="num" style="text-transform:none">${b.day_nm ?? "—"} nm</span></h2><div class="tl">${rows}</div>`;
}

// ---- programma a due settimane, con fascia di affidabilità per giorno
function programGrid(prog) {
  if (!prog?.days?.length) return `<h2>Programma — 2 settimane</h2>
    <p style="font-size:.85rem;color:var(--soft)">Programma esteso non disponibile (dati non ancora pubblicati o cache vecchia) — sotto il dettaglio dei prossimi giorni.</p>`;
  const tiers = prog.tiers || {};
  const cells = prog.days.map(d => {
    const wd = new Date(d.date + "T12:00").toLocaleDateString("it", { weekday: "short", day: "numeric", month: "short" });
    const route = d.rest ? `Sosta — ${esc(d.to)}` : `${esc(d.frm)} → ${esc(d.to)}`;
    const wxLine = d.wx
      ? `<span style="font-style:normal">${wmoIcon(d.wx.wmo)} ${Math.round(d.wx.tmax)}° · <b class="num">${Math.round(d.wx.wind_max)}</b> kn ${comp(d.wx.wind_dir)}${d.wx.synthetic ? " · sint." : ""}</span>`
      : `<span style="font-style:normal;opacity:.75">— nessuna previsione</span>`;
    const waveLine = d.wave ? `<span style="font-style:normal">onda max ${d.wave.hmax.toFixed(1)} m</span>` : "";
    const sstLine = d.sst != null ? `<span style="font-style:normal">🌊 ${Math.round(d.sst)}°</span>` : "";
    const cd = d.crew_delta || {};
    const crew = (cd.on?.length || cd.off?.length)
      ? `<span style="font-style:normal;color:var(--warmtx);font-weight:600">equipaggio${cd.on?.length ? ` +${cd.on.length}` : ""}${cd.off?.length ? ` −${cd.off.length}` : ""}</span>` : "";
    const dots = d.n_tappe > 1 ? ` <span style="color:var(--accent);letter-spacing:.1em">${"●".repeat(Math.min(d.n_tappe, 3))}</span>` : "";
    return `<div class="day ${d.tier}" title="${esc(tiers[d.tier] ?? "")} — tocca per la scheda"
      ${d.to_id ? `onclick="openDest('${d.to_id}')" style="cursor:pointer"` : ""}>
      <em>${wd}${d.night ? " 🌙" : ""}</em>
      <strong>${d.nm}<span style="font-size:.7rem"> nm</span>${dots}</strong>
      <span class="water">${route}</span>
      ${d.rating != null ? `<span style="font-style:normal">${stars(d.rating)}</span>` : ""}
      ${wxLine}${waveLine}${sstLine}${crew}</div>`;
  }).join("");
  return `<h2>Programma — 2 settimane</h2>
  <div class="pgrid">${cells}</div>
  <div class="legend" style="flex-wrap:wrap">
    <span><b style="color:var(--accent)">▔</b> previsione piena (≤7 gg)</span>
    <span><b style="color:var(--giallo)">▔</b> ridotta (8–10 gg)</span>
    <span><b style="color:var(--soft)">▔</b> solo programma</span>
    <span>● = tappe del giorno</span>
  </div>
  ${prog.days.some(d => d.tier === "programma") ? `<p class="vflag" style="margin-top:.5rem;font-size:.8rem">Oltre ~10 giorni: solo programma, nessuna previsione affidabile.</p>` : ""}`;
}

function dailyStrip(prog, kind) {
  const days = prog?.days || [];
  const have = days.filter(d => kind === "wind" ? d.wx : d.wave);
  if (!have.length) return "";
  const max = kind === "wind"
    ? Math.max(22, ...have.map(d => d.wx.wind_max))
    : Math.max(1.2, ...have.map(d => d.wave.hmax));
  const cols = days.map(d => {
    const wd = new Date(d.date + "T12:00").toLocaleDateString("it", { weekday: "short", day: "numeric" });
    const dim = d.tier === "degradata" ? " dim" : "";
    const data = kind === "wind" ? d.wx : d.wave;
    if (!data) return `<div class="hr wide" title="${wd} — oltre l'orizzonte di previsione"><span></span><div class="col" style="height:4px"></div></div>`;
    if (kind === "wind") {
      const f = bft(data.wind_max);
      const px = Math.max(6, Math.round(data.wind_max / max * 96));
      return `<div class="hr wide${dim}" title="${wd} — vento max ${Math.round(data.wind_max)} kn da ${comp(data.wind_dir)} · raffiche ${Math.round(data.gust_max)} · F${f} ${BFT_NAME[f]}">
        <span style="transform:rotate(${(data.wind_dir + 180) % 360}deg);display:flex">${ARROW}</span>
        <div class="col" style="height:${px}px;background:${SCALE_COL[f]}"></div></div>`;
    }
    const st = seaState(data.hmax);
    const px = Math.max(6, Math.round(data.hmax / max * 96));
    const rot = data.dir != null ? `<span style="transform:rotate(${(data.dir + 180) % 360}deg);display:flex">${ARROW}</span>` : "<span></span>";
    return `<div class="hr wide${dim}" title="${wd} — onda max ${data.hmax.toFixed(1)} m · mare ${st} (${SEA_NAME[st]})">${rot}<div class="col" style="height:${px}px;background:${SCALE_COL[st]}"></div></div>`;
  }).join("");
  const vals = days.map(d => `<span>${kind === "wind" ? (d.wx ? Math.round(d.wx.wind_max) : "—") : (d.wave ? d.wave.hmax.toFixed(1).replace("0.", ".") : "—")}</span>`).join("");
  const axis = days.map(d => `<span>${new Date(d.date + "T12:00").toLocaleDateString("it", { weekday: "narrow", day: "numeric" })}</span>`).join("");
  return `<h2>${kind === "wind" ? "Vento" : "Onda"} — 14 giorni · max giornaliero</h2>
  <div class="ribbon"><div class="strip">${cols}</div>
  <div class="axis wide vals">${vals}</div><div class="axis wide">${axis}</div></div>
  <div class="legend"><span>colonne attenuate = affidabilità ridotta (8–10 gg)</span>${kind === "wave" ? "<span>orizzonte marine ~8 giorni</span>" : ""}</div>`;
}

// colore acqua per temperatura (fresca→calda): dal turchese all'ambra
const sstColor = t => t == null ? "var(--sea-2)"
  : t < 18 ? "#4A8FBF" : t < 21 ? "#38A3C4" : t < 24 ? "#37D07C"
  : t < 26 ? "#A8D34C" : t < 28 ? "#FFD54F" : "#FFB454";

function sstStrip(prog) {
  const days = prog?.days || [];
  const have = days.filter(d => d.sst != null);
  if (!have.length) return "";
  const cols = days.map(d => {
    const wd = new Date(d.date + "T12:00").toLocaleDateString("it", { weekday: "narrow", day: "numeric" });
    if (d.sst == null) return `<div class="hr wide"><span class="sstv">—</span><em>${wd}</em></div>`;
    return `<div class="hr wide" title="${d.to} — mare ~${d.sst.toFixed(1)}°"><span class="sstv" style="color:${sstColor(d.sst)}">${Math.round(d.sst)}°</span><em>${wd}</em></div>`;
  }).join("");
  return `<h2>Temperatura del mare — 14 giorni</h2>
  <div class="ribbon"><div class="strip sst">${cols}</div></div>
  <div class="legend"><span class="water">superficie, alla destinazione del giorno · modello Open-Meteo</span><span>orizzonte marine ~8 giorni</span></div>`;
}

// catalogo destinazioni: voto 1-5 (stima) + foto Commons, ordinato per voto
function destCatalog(prog) {
  const ds = prog?.destinations || [];
  if (!ds.length) return "";
  const cards = ds.map(d => `
    <div class="dest" onclick="openDest('${d.id}')">
      ${d.photo?.src
        ? `<img class="dphoto" loading="lazy" src="${d.photo.src}" alt="${esc(d.name)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'dphoto none',textContent:'⚓'}))">`
        : `<div class="dphoto none">⚓</div>`}
      <div class="dbody"><h3 class="water">${esc(d.name)}</h3>
      ${stars(d.rating)}
      ${d.notes ? `<p>${esc(d.notes)}</p>` : ""}</div>
    </div>`).join("");
  return `<h2>Destinazioni — schede, voti e foto</h2>
  <p class="hint">Tocca una destinazione per la scheda: gallery, caratteristiche, storia e link.</p>
  <details open><summary>${ds.length} destinazioni, dalla più bella</summary><div class="dests">${cards}</div></details>`;
}

const myMaps = () => navigator.onLine ? `
  <h2>Mappa — rotta live</h2>
  <div style="border:1px solid var(--hair);border-radius:3px;overflow:hidden">
    <iframe src="https://www.google.com/maps/d/embed?mid=1RJf2lcAZMecJ238BEcXIA3uyJcuEHr8&ehbc=2E312F"
      style="width:100%;height:380px;border:0;display:block" loading="lazy" title="Mappa della rotta"></iframe>
  </div>
  <p style="margin-top:.5rem;font-size:.76rem;color:var(--soft)">
    Mappa condivisa, aggiornata in tempo reale — i segnaposto NON sono punti di fonda verificati.</p>` : "";

// ---- schede destinazione (modale) --------------------------------------
// nome cliccabile → apre la scheda. openDest usa l'hash (#dest-<id>) così il
// tasto Indietro e Esc chiudono; la scheda è un overlay: il tab sotto resta.
const destLink = (name, id) => id
  ? `<a class="dl" onclick="openDest('${id}')">${esc(name)}</a>` : esc(name);
function openDest(id) { location.hash = "dest-" + id; }

// dati scheda: prima il dettaglio (destinations.json), poi il catalogo come
// fallback (name/rating/notes/1 foto) → la scheda funziona anche senza il 5° file
function destData(id) {
  const d = window.__dests?.entries?.[id];
  if (d) return d;
  const c = (window.__prog?.destinations || []).find(x => x.id === id);
  return c ? { name: c.name, type: c.type, rating: c.rating, verify: c.verify,
    notes: c.notes, gallery: c.photo ? [c.photo] : [], wiki: null,
    coords: c.coords || null, shelter: null } : null;
}

// temperatura del mare per una destinazione: dal programma (giorno con questo
// to_id) o dalla posizione di oggi — coerente con "raccolta quando ci andiamo"
function seaTempFor(id) {
  const day = (window.__prog?.days || []).find(x => x.to_id === id && x.sst != null);
  if (day) {
    const when = window.__prog.day === day.date ? "oggi"
      : new Date(day.date + "T12:00").toLocaleDateString("it", { day: "numeric", month: "short" });
    return { t: day.sst, when };
  }
  return null;
}

function schedaHTML(id) {
  const d = destData(id);
  if (!d) return `<h1>Destinazione</h1><p class="water">Dettagli non disponibili.</p>`;
  const gal = (d.gallery || []).map(p =>
    `<a href="${p.page ?? p.src}" target="_blank" rel="noopener"><img loading="lazy" src="${p.src}" alt="${esc(d.name)}" onerror="this.parentNode.remove()"></a>`).join("");
  const sh = d.shelter, co = d.coords, sea = seaTempFor(id);
  const facts = [
    d.type ? `<div class="fact"><b>${esc(d.type)}</b><i>tipo</i></div>` : "",
    sea ? `<div class="fact"><b style="color:${sstColor(sea.t)}">🌊 ${Math.round(sea.t)}°</b><i>mare · ${esc(sea.when)}</i></div>` : "",
    sh?.holding ? `<div class="fact"><b style="font-size:.85rem">${esc(sh.holding)}</b><i>fondo</i></div>` : "",
    sh?.depth_m ? `<div class="fact"><b>${sh.depth_m[0]}–${sh.depth_m[1]} m</b><i>profondità</i></div>` : "",
    sh?.exposed_from != null ? `<div class="fact"><b>${comp(sh.exposed_from)}–${comp(sh.exposed_to)}</b><i>esposta a</i></div>` : "",
    co ? `<div class="fact"><b style="font-size:.8rem">${co[0].toFixed(3)}, ${co[1].toFixed(3)}</b><i>posizione</i></div>` : "",
  ].filter(Boolean).join("");
  const maps = co ? `https://www.google.com/maps/search/?api=1&query=${co[0]},${co[1]}` : null;
  const q = encodeURIComponent(d.name + " ancoraggio");
  const links = [
    d.wiki ? `<a href="${d.wiki.url}" target="_blank" rel="noopener">Wikipedia</a>` : "",
    maps ? `<a href="${maps}" target="_blank" rel="noopener">📍 Google Maps</a>` : "",
    `<a href="https://www.navily.com/search?q=${encodeURIComponent(d.name)}" target="_blank" rel="noopener">⚓ Navily</a>`,
    `<a href="https://duckduckgo.com/?q=${q}" target="_blank" rel="noopener">🔍 Cerca sul web</a>`,
  ].filter(Boolean).join("");
  return `
    <h1 class="water">${esc(d.name)}</h1>
    <div class="sub">${d.rating != null ? stars(d.rating) : ""}${d.type ? `<span>${esc(d.type)}</span>` : ""}</div>
    ${gal ? `<div class="gal">${gal}</div>` : ""}
    ${d.notes ? `<h2>In breve</h2><p class="water" style="font-size:.9rem">${esc(d.notes)}</p>` : ""}
    ${facts ? `<h2>Caratteristiche</h2><div class="leg"><div class="facts">${facts}</div></div>` : ""}
    ${d.wiki ? `<h2>Storia e territorio</h2><div class="storia">${esc(d.wiki.extract)}
      <span class="src">da Wikipedia (${d.wiki.lang.toUpperCase()}) · <a href="${d.wiki.url}" target="_blank" rel="noopener">apri la voce</a></span></div>` : ""}
    <h2>Link</h2><div class="linkrow">${links}</div>`;
}

function showScheda(id) {
  const box = document.getElementById("scheda");
  document.getElementById("scheda-in").innerHTML = schedaHTML(id);
  box.hidden = false;
  box.querySelector(".sheet").scrollTop = 0;
}
function hideScheda() { document.getElementById("scheda").hidden = true; }
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && !document.getElementById("scheda").hidden) history.back();
});

// ---- hash-router: si renderizza UNA volta, poi si mostra/nasconde (gli
// iframe non si ricaricano, lo scroll di ogni tab si conserva)
const TABS = ["oggi", "vento", "mare", "programma"];
let currentTab = null;
const scrollMem = {};
function route() {
  const h = location.hash.slice(1);
  if (h.startsWith("dest-")) { showScheda(h.slice(5)); return; }  // overlay: il tab sotto resta
  hideScheda();
  const t = TABS.includes(h) ? h : "oggi";
  if (currentTab && currentTab !== t) scrollMem[currentTab] = window.scrollY;
  TABS.forEach(x => {
    document.getElementById("tab-" + x)?.classList.toggle("on", x === t);
    document.getElementById("nav-" + x)?.classList.toggle("on", x === t);
  });
  if (currentTab !== t) window.scrollTo(0, scrollMem[t] || 0);
  currentTab = t;
}
window.addEventListener("hashchange", route);

function render(b, wx, c, prog) {
  document.getElementById("boat").textContent = b.boat;
  const a = ago(b.generated_at);
  const w = document.getElementById("when");
  w.className = "when" + (a.stale ? " stale" : "");
  w.innerHTML = `${new Date(b.day + "T12:00").toLocaleDateString("it", { day: "numeric", month: "short" })}<br>${a.txt}`;

  // il primo skipper (Edoardo Casella) ha la sua pagina, linkata dal nome
  document.getElementById("captains").innerHTML =
    b.captains?.length ? "Capitani · " + b.captains.map(c =>
      /edoardo casella/i.test(c)
        ? `<a href="skipper.html" style="color:inherit;border-bottom:1px dotted currentColor;text-decoration:none">${esc(c)}</a>`

    ? `<div class="flag ok"><b>Piano approvato</b>Confermato da ${esc(b.approved_by)}.</div>`
    : `<div class="flag"><b>Proposta — non approvata</b>Generata dal meteo, non ancora confermata dallo skipper. Non salpate su questa pagina.</div>`;
  const simFlag = b.sim
    ? `<div class="flag sim"><b>Simulazione</b>Come se si salpasse oggi da ${esc(b.position?.name ?? "—")}: rotta e meteo sono reali, le date no. La crociera vera inizia ${b.cruise_start ? "l'" + new Date(b.cruise_start + "T12:00").toLocaleDateString("it", { day: "numeric", month: "long" }) : "—"}.</div>` : "";
  document.getElementById("flag").innerHTML = simFlag + state;

  const conf = b.confidence?.confidence ?? "sconosciuta";
  const t = b.tonight, pb = b.plan_b;

  const oggi = `
  ${b.departure_at && new Date(b.departure_at) > new Date() ? `
  <div class="count" id="countdown" data-t="${esc(b.departure_at)}">
    <span class="lbl">⏳ Mollo gli ormeggi — ${new Date(b.departure_at).toLocaleDateString("it", { day: "numeric", month: "long" })} ore ${b.departure_at.slice(11, 16)}</span>
    <span><b data-u="g">—</b><i>giorni</i></span><span><b data-u="h">—</b><i>ore</i></span>
    <span><b data-u="m">—</b><i>min</i></span><span><b data-u="s">—</b><i>sec</i></span>
  </div>
  <a class="crew-cta" href="https://form.jotform.com/261907242193053" target="_blank" rel="noopener">🧭 Questionario equipaggio</a>` : ""}
  ${execCard(b, wx)}
  <h2>Oggi${b.position ? ` — <span style="text-transform:none;letter-spacing:0">${esc(b.position.name)}</span>` : ""}</h2>
  ${b.now ? `<div class="nowbar">
    <span>📍 <b>${esc(b.position?.name ?? "—")}</b> ${b.position?.live ? `(GPS, ${b.position.age_h} h fa)` : "(da piano)"}</span>
    <span>${wmoIcon(b.now.wmo)} <b>${b.now.temp != null ? Math.round(b.now.temp) + "°" : "—"}</b></span>
    <span>umidità <b>${b.now.rh ?? "—"}%</b></span>
    <span>vento <b>${Math.round(b.now.tws)} kn</b> da ${comp(b.now.twd)}</span>
    ${b.now.sst != null ? `<span title="temperatura superficiale, modello Open-Meteo">🌊 mare <b>${Math.round(b.now.sst)}°</b></span>` : ""}
    <span>pioggia <b>${b.now.rain ?? 0} mm/h</b></span></div>` : ""}
  ${tappeTimeline(b)}
  ${(b.steps?.length ?? 0) > 1 && !b.rest ? "<h2>Tratta principale</h2>" : ""}
  ${legCard(b)}
  ${skyStrip(wx.hours)}

  <h2>Stanotte</h2>
  ${b.leg?.night ? `<p class="water" style="font-size:.95rem">🌙 In navigazione — arrivo all'alba a ${esc(b.leg.leg.split(/ (?:->|→) /)[1] ?? "destinazione")}. Turni di guardia decisi dagli skipper.</p>` :
  t ? `<div class="rada"><div class="dot ${t.light}"></div>
      <div><h3>${destLink(t.name, t.id)} ${stars(t.rating)}</h3><p class="water">${esc(t.why)} · fondo ${esc(t.holding)}</p></div>
      ${thumb(t.photo, t.name)}<div class="pts num">${t.score}</div></div>` : `<p>Rada non definita.</p>`}
  ${pb ? `<div class="b-plan"><b>Piano B</b><span class="water">${destLink(pb.name, pb.id)}</span> — ${esc(pb.why)}.</div>` : ""}
  <details><summary>Le altre rade con questo vento</summary>
    ${b.ranked.filter(r => r.id !== t?.id && r.id !== pb?.id).map(r => `<div class="rada"><div class="dot ${r.light}"></div>
      <div><h3>${destLink(r.name, r.id)}</h3><p class="water">${esc(r.why)}</p></div>
      <div class="pts num">${r.score}</div></div>`).join("")}
  </details>

  ${astroCard(wx.astro, b.day)}

  <h2>Conti</h2>
  <details><summary>${c.person_nights} persona-notte · ${c.spent.toFixed(2)} € anticipati finora</summary>
    <table><thead><tr><th>Nome</th><th>Notti</th><th>Quota</th></tr></thead><tbody>
      ${c.per_person.map(p => `<tr><td>${esc(p.name)}</td><td>${p.nights}</td><td>${Math.round(p.total)} €</td></tr>`).join("")}
    </tbody></table>
    ${c.transfers.length ? `<p style="margin-top:.9rem;font-size:.85rem;color:var(--soft)">Per pareggiare:</p>
      <table><tbody>${c.transfers.map(t => `<tr><td>${esc(t.from)} → ${esc(t.to)}</td><td>${t.amount.toFixed(2)} €</td></tr>`).join("")}</tbody></table>` : ""}
  </details>`;

  const vento = `
  <h2>Vento — 48 ore</h2>
  ${ribbon(wx.hours)}
  <p style="margin-top:.7rem;font-size:.82rem;color:var(--soft)">
    Accordo fra i modelli ECMWF e ICON: <strong>${esc(conf)}</strong>${b.confidence?.mean_spread_kn != null
      ? ` (scarto medio ${b.confidence.mean_spread_kn} kn)` : ""}.
    ${conf === "bassa" ? " Non pianificare oltre le 24 ore." : ""}
  </p>
  ${dailyStrip(prog, "wind")}
  ${windyMap(b.position, "wind", "Vento — mappa live")}`;

  const mare = `
  ${waveRibbon(wx.hours)}
  ${dailyStrip(prog, "wave")}
  ${sstStrip(prog)}
  ${windyMap(b.position, "waves", "Onde — mappa live")}`;

  const programma = `
  ${programGrid(prog)}
  <h2>Prossimi giorni — dettaglio</h2>

  document.getElementById("app").innerHTML = `
  <section id="tab-oggi">${oggi}</section>
  <section id="tab-vento">${vento}</section>
  <section id="tab-mare">${mare}</section>
  <section id="tab-programma">${programma}</section>`;
  route();
}

(async () => {
  // due catch separati: "manca la rete" e "la pagina ha un bug" sono diagnosi
  // diverse e all'equipaggio serve quella giusta
  let data, prog = null;
  try {
    data = window.__DATA ?? await Promise.all(
      ["briefing", "weather", "conti"].map(n => fetch(`data/${n}.json`, { cache: "no-cache" }).then(r => {
        if (!r.ok) throw new Error(n); return r.json();
      })));
  } catch (e) {
    document.getElementById("when").textContent = "dati non raggiungibili";
    document.getElementById("app").innerHTML = `<div class="err">
      <strong>Nessun dato disponibile.</strong> La pagina non ha trovato il briefing e non ha una copia in cache.
      Se sei in rada senza rete, riapri quando torni sotto copertura. Nel frattempo il meteo ufficiale è su
      <a href="https://www.meteoam.it/it/mare">meteoam.it</a>.</div>`;
  }
  // programma esteso e schede dettaglio: additivi e fault-tolerant. Se
  // mancano (deploy in corso, cache vecchia) la plancia funziona lo stesso —
  // le schede ripiegano sul catalogo, le viste 14gg si omettono.
  try {
    const r = await fetch("data/program.json", { cache: "no-cache" });
    if (r.ok) prog = await r.json();
  } catch (e) { /* niente programma: fallback in programGrid */ }
  window.__prog = prog;
  try {
    const r = await fetch("data/destinations.json", { cache: "no-cache" });
    if (r.ok) window.__dests = await r.json();
  } catch (e) { /* niente schede dettaglio: fallback al catalogo */ }
  if (data) try {
    window.__astro = data[1]?.astro;
    applyTheme();
    render(data[0], data[1], data[2], prog);
  } catch (e) {
    document.getElementById("when").textContent = "errore di pagina";
    document.getElementById("app").innerHTML = `<div class="err">
      <strong>I dati ci sono ma la pagina non riesce a mostrarli.</strong> Non è un problema di rete:
      segnalalo a chi mantiene la dashboard. Il briefing grezzo è in
      <a href="data/briefing.json">data/briefing.json</a>, il meteo ufficiale su
      <a href="https://www.meteoam.it/it/mare">meteoam.it</a>.</div>`;
  }
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
})();

// orologio di bordo in tempo reale
const clockTick = () => {
  const el = document.getElementById("clock");
  if (el) el.textContent = new Date().toLocaleDateString("it", { weekday: "short", day: "numeric", month: "short" })
    + " · " + new Date().toLocaleTimeString("it");
};
clockTick();
const clockTimer = setInterval(clockTick, 1000);
clockTimer.unref?.();

// tema giorno/notte: auto sull'alba e il tramonto veri (day-mode leggibile al
// sole, night-mode che non brucia la visione notturna), forzabile dal bottone
function themeMode() { try { return localStorage.getItem("nina_theme") || "auto"; } catch { return "auto"; } }
function applyTheme() {
  const mode = themeMode();
  let dark;
  if (mode === "auto") {
    const a = (window.__astro || [])[0];
    const hm = new Date().toTimeString().slice(0, 5);
    dark = hm < (a?.sunrise ?? "06:30") || hm > (a?.sunset ?? "20:30");
  } else dark = mode === "dark";
  if (document.documentElement?.dataset) document.documentElement.dataset.theme = dark ? "dark" : "light";
  const btn = document.getElementById("themeBtn");
  if (btn) btn.textContent = mode === "auto" ? "AUTO" : (dark ? "NOTTE" : "GIORNO");
  const meta = document.querySelector?.('meta[name="theme-color"]');
  if (meta) meta.content = dark ? "#060D18" : "#FFFFFF";
}
function cycleTheme() {
  const next = { auto: "light", light: "dark", dark: "auto" }[themeMode()] || "auto";
  try { localStorage.setItem("nina_theme", next); } catch {}
  applyTheme();
}
applyTheme();
const themeTimer = setInterval(applyTheme, 60000);
themeTimer.unref?.();

// countdown alla partenza (l'elemento appare dopo il render: si cerca a ogni tick)
const countTick = () => {
  const el = document.getElementById("countdown");
  if (!el || !el.dataset || !el.querySelectorAll) return;
  let ms = new Date(el.dataset.t) - new Date();
  if (ms < 0) ms = 0;
  const vals = { g: Math.floor(ms / 864e5), h: Math.floor(ms / 36e5) % 24,
                 m: Math.floor(ms / 6e4) % 60, s: Math.floor(ms / 1e3) % 60 };
  el.querySelectorAll("b[data-u]").forEach(x => {
    x.textContent = String(vals[x.dataset.u]).padStart(2, "0");
  });
};
countTick();
const countTimer = setInterval(countTick, 1000);
countTimer.unref?.();

// indicatore LIVE / OFFLINE
const liveTick = () => {
  const el = document.getElementById("live");
  if (!el) return;
  const on = typeof navigator !== "undefined" && navigator.onLine !== false;
  el.className = "live " + (on ? "on" : "off");
  el.textContent = on ? "LIVE" : "OFFLINE";
};
liveTick();
window.addEventListener?.("online", liveTick);
window.addEventListener?.("offline", liveTick);
</script>
</body>
