<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Equipaggio · Plancia Niña</title>
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0A1424">
<script src="theme.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans+Condensed:wght@600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBFDFF; --sea-1:#EEF4F9; --sea-2:#D8E4EE; --panel:#FFFFFF;
  --ink:#0B1320; --soft:#3E556B; --hair:#C4D2DF; --accent:#006B9F; --gold:#B8860B; --gold-2:#E5C158; --verde:#0A7A43;
  --display:"IBM Plex Sans Condensed",system-ui,sans-serif; --body:"IBM Plex Sans",system-ui,sans-serif; --mono:"IBM Plex Mono",ui-monospace,monospace;
}
@media (prefers-color-scheme: dark){:root{
  --paper:#070E1A; --sea-1:#101E33; --sea-2:#1C3552; --panel:#0C1728;
  --ink:#DCE7F5; --soft:#8299B4; --hair:#22384F; --accent:#35C4E7; --gold:#E5C158; --gold-2:#FBE7A8; --verde:#2FBF71;
}}
*{box-sizing:border-box;margin:0}
body{background:var(--paper);color:var(--ink);font:400 16px/1.55 var(--body);-webkit-font-smoothing:antialiased}
main{max-width:720px;margin:0 auto;border-left:1px solid var(--hair);border-right:1px solid var(--hair);min-height:100vh}
.wrap{max-width:720px;margin:0 auto}
a{color:var(--accent)}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb, var(--paper) 88%, transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--hair)}
.top .wrap{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.1rem}
.back{font:700 .66rem/1 var(--display);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--soft)}
.top .tag{font:700 .66rem/1 var(--display);letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
section{padding:0 1.1rem 1.6rem}
h2{font:700 .74rem/1 var(--display);letter-spacing:.2em;text-transform:uppercase;color:var(--soft);
  margin:1.5rem 0 1rem;display:flex;align-items:center;gap:.55rem;border-left:3px solid var(--gold);padding-left:.55rem}
h2::after{content:"";flex:1;height:1px;background:var(--hair)}
/* hero membro */
.mhero{padding:1.6rem 1.1rem 0;display:flex;gap:1.1rem;align-items:center;flex-wrap:wrap}
.mphoto{width:132px;height:176px;flex:none;border-radius:8px;object-fit:cover;background:var(--sea-2);box-shadow:0 8px 22px rgba(0,0,0,.25)}
.mph-ph{width:132px;height:176px;flex:none;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font:700 3.4rem/1 var(--display);color:#fff;background:linear-gradient(150deg,var(--accent),var(--sea-2))}
.mhd{flex:1;min-width:11rem}
.mhd .role{font:700 .62rem/1 var(--display);letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
.mhd h1{font:700 2.2rem/1.02 var(--display);letter-spacing:.01em;margin:.35rem 0 .2rem}
.mhd .nick{color:var(--soft);font-style:italic}
.badge{display:inline-flex;align-items:center;gap:.3rem;margin-top:.6rem;font:700 .62rem/1.2 var(--display);letter-spacing:.06em;text-transform:uppercase;border-radius:99px;padding:.32rem .7rem}
.badge.vet{color:var(--gold);border:1px solid var(--gold)}
.badge.rookie{color:var(--accent);border:1px solid var(--accent)}
.rankrow{margin-top:.55rem}
.rankbadge{display:inline-flex;align-items:center;gap:.35rem;font:700 .6rem/1.2 var(--display);letter-spacing:.06em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);border-radius:99px;padding:.28rem .6rem .28rem .4rem}
.rankbadge b{font-weight:700}
svg.ins{height:1.5em;width:2.4em;display:block;overflow:visible;flex:none}
/* stats */
.mstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:1px;background:var(--hair);border:1px solid var(--hair);border-radius:6px;overflow:hidden;margin-top:1.3rem}
.mstat{background:var(--panel);padding:.9rem .4rem;text-align:center}
.mstat b{display:block;font:700 1.5rem/1 var(--mono);color:var(--ink)}
.mstat i{display:block;font:700 .52rem/1.3 var(--display);letter-spacing:.1em;text-transform:uppercase;color:var(--soft);font-style:normal;margin-top:.4rem}
.card{background:var(--panel);border:1px solid var(--hair);border-left:3px solid var(--accent);border-radius:5px;padding:.9rem 1rem;font-size:.94rem;line-height:1.6}
.card.note{border-left-color:var(--gold)}
.plink{color:inherit;text-decoration:none;border-bottom:1px dotted var(--accent)}
.plink:hover{color:var(--accent)}
.flag{width:22px;height:14px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.18);vertical-align:-2px;margin-right:.1rem}
.card.bio{border-left-color:var(--gold)}
.card.bio .epithet{display:block;font:700 .62rem/1.3 var(--display);letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem}
.tlog{display:flex;flex-direction:column;gap:.4rem}
.tlrow{display:flex;align-items:center;gap:.55rem;background:var(--panel);border:1px solid var(--hair);border-radius:7px;padding:.55rem .7rem;text-decoration:none;color:inherit}
.tlrow:hover{border-color:var(--accent)}
.tlrow .fl{flex:none;display:inline-flex;align-items:center}
.tlrow .z{flex:1;min-width:0}
.tlrow .z b{display:block;font-size:.92rem}
.tlrow .z small{color:var(--soft);font-size:.76rem}
.tlrow .y{font:700 .82rem/1 var(--mono);color:var(--soft);flex:none}
.tlrow .go{color:var(--soft);font-weight:700}
.pace{flex:none;font:700 .54rem/1 var(--display);letter-spacing:.05em;text-transform:uppercase;border-radius:99px;padding:.28rem .5rem}
.pace.chill{background:rgba(47,191,113,.16);color:var(--verde)}
.pace.cruise{background:rgba(0,107,159,.15);color:var(--accent)}
.pace.push{background:rgba(184,134,11,.18);color:var(--gold)}
.pace.extreme{background:rgba(197,48,48,.16);color:#C53030}
/* tag di profilo */
.mtags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:1rem}
.mtag{font:700 .6rem/1 var(--display);letter-spacing:.06em;text-transform:uppercase;background:var(--sea-2);color:var(--accent);border-radius:99px;padding:.42rem .7rem}
/* companions */
.cchips{display:flex;flex-wrap:wrap;gap:.5rem}
.cchip{display:inline-flex;align-items:center;gap:.5rem;background:var(--panel);border:1px solid var(--hair);border-radius:99px;padding:.24rem .8rem .24rem .28rem;text-decoration:none;color:inherit}
.cchip:hover{border-color:var(--accent)}
.cchip .cav{width:34px;height:34px;border-radius:50%;object-fit:cover;flex:none;background:var(--sea-2);display:flex;align-items:center;justify-content:center;font:700 .9rem/1 var(--display);color:#fff}
.cchip .cn{font-weight:600;font-size:.88rem;line-height:1.12}
.cchip .cn small{display:block;font:400 .68rem/1.2 var(--body);color:var(--soft)}
.q-empty{background:var(--sea-1);border:1px dashed var(--hair);border-radius:5px;padding:1rem;color:var(--soft);font-size:.9rem;text-align:center}
.q-empty a{font-weight:600}
.qrow{display:grid;grid-template-columns:7.5rem 1fr;gap:.5rem;padding:.5rem 0;border-bottom:1px solid var(--hair);font-size:.92rem}
.qrow:last-child{border-bottom:0}
.qrow b{font:700 .58rem/1.3 var(--display);letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
/* ciurma 2026: griglia intera (niente scroll orizzontale) + galleria */
.strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:.8rem .5rem;padding:.3rem 0 .6rem}
.strip a{text-align:center;text-decoration:none;color:var(--soft)}
.strip .av{width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--sea-2);display:flex;align-items:center;justify-content:center;font:700 1.2rem/1 var(--display);color:#fff;margin:0 auto .25rem}
.strip small{font-size:.64rem;display:block;line-height:1.15}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.8rem}
.pgal{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.7rem}
.pgal figure{margin:0;cursor:zoom-in}
.pgal img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:6px;display:block;background:var(--sea-2)}
.pgal figcaption{margin-top:.28rem;font:700 .56rem/1.3 var(--display);letter-spacing:.06em;text-transform:uppercase}
.pgal figcaption a{color:var(--soft);text-decoration:none}
.pgal figcaption a:hover{color:var(--accent)}
.mcard{background:var(--panel);border:1px solid var(--hair);border-radius:8px;overflow:hidden;text-decoration:none;color:inherit;display:block}
.mcard .ph{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--sea-2);display:flex;align-items:center;justify-content:center;font:700 2.6rem/1 var(--display);color:#fff}
.mcard .b{padding:.6rem .7rem}
.mcard .b b{display:block;font-size:.95rem}
.mcard .b span{font:700 .56rem/1.2 var(--display);letter-spacing:.06em;text-transform:uppercase;color:var(--soft)}
.mcard .b .vt{color:var(--gold)} .mcard .b .rk{color:var(--accent)}
footer{display:block;padding:1.8rem 1.1rem 3rem;text-align:center;color:var(--soft);font-size:.85rem}
footer a.pl{display:inline-block;margin-top:1rem;font:700 .66rem/1 var(--display);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--soft);border:1px solid var(--hair);padding:.6rem 1rem;border-radius:99px}
.zoom{cursor:zoom-in}
#lb{position:fixed;inset:0;z-index:80;background:rgba(3,7,14,.95);display:none;align-items:center;justify-content:center}
#lb.on{display:flex}
#lb img{max-width:96vw;max-height:90vh;object-fit:contain;border-radius:4px}
#lb .x{position:absolute;top:.7rem;right:1rem;color:#fff;font-size:1.9rem;background:none;border:0;cursor:pointer;line-height:1}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="top"><div class="wrap">
  <a class="back" href="arrivi.html">‹ La ciurma</a>
  <span class="tag">⚓ Equipaggio Niña</span>
</div></div>
<main id="app"></main>
<div id="lb"><button class="x" aria-label="chiudi">✕</button><img alt=""></div>

<script>
const esc = s => String(s ?? "").replace(/[<>&]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
const nfmt = n => String(Math.round(n || 0)).replace(/\B(?=(\d{3})+(?!\d))/g, ".");
// bandiere + zona per il log viaggi (stessa logica di viaggio.html)
const CC = { Greece: "gr", Croazia: "hr", Spain: "es", Italy: "it", France: "fr", Cuba: "cu", Seychelles: "sc", "Saint Vincent": "vc", "Saint Lucia": "lc", Turkey: "tr" };
const partsC = c => (c || "").split(/[-&]/).map(x => x.trim()).filter(Boolean);
const flag1 = c => CC[c] ? `<img class="flag" src="skipper/flags/${CC[c]}.svg" alt="${esc(c)}">` : "";
const flags = country => partsC(country).map(flag1).join("");
const cleanZone = z => (z || "").replace(/\s*-\s*(GR|SP|IT|TR|FR)\s*$/i, "").replace(/\s+CZ$/i, "").trim();
function pace(a) {  // livello di attività = ritmo nm/giorno (come nel dossier skipper)
  if (a == null) return null;
  if (a < 18) return { k: "chill", t: "Chilling" };
  if (a < 30) return { k: "cruise", t: "Crociera" };
  if (a < 40) return { k: "push", t: "Spinto" };
  return { k: "extreme", t: "Estremo" };
}
function tripRow(t) {
  const avg = t.days ? Math.round(t.nm / t.days) : null, p = pace(avg);
  const bn = BOATNAME.get(t.id);                       // nome barca da trips.json
  const boatTxt = (bn ? `«${esc(bn)}»${t.boat ? " · " : ""}` : "") + esc(t.boat || "");
  const dur = t.days ? `${t.days} ${t.days === 1 ? "giorno" : "giorni"}` : "";   // durata del viaggio
  const aboard = (t.pdays != null && t.days && t.pdays < t.days) ? ` · a bordo ${t.pdays} gg` : ""; // giorni a bordo di questa persona (se < viaggio)
  return `<a class="tlrow" href="viaggio.html#${t.id}"><span class="fl">${flags(t.country) || "⚓"}</span>` +
    `<span class="z"><b>${esc(cleanZone(t.zone) || t.country || "")}</b>` +
    `<small>${boatTxt}${t.nm ? ` · ${t.nm} nm` : ""}${dur ? ` · ${dur}` : ""}${aboard}</small></span>` +
    `${p ? `<span class="pace ${p.k}">${p.t}</span>` : ""}<span class="y num">${t.year || ""}</span><span class="go">›</span></a>`;
}
// aneddoti taggati con questa persona (link alla pagina Aneddoti)
const anecFor = id => (ANEC || []).filter(a => (a.people || []).includes(id));
function anecRow(a) {
  return `<a class="tlrow" href="aneddoti.html#${a.id}"><span class="fl">${a.kind === "eroico" ? "🎖️" : a.kind === "leggenda" ? "🌀" : "⚓"}</span>` +
    `<span class="z"><b>${esc(a.title)}</b><small>${esc(a.meta || "")}</small></span>` +
    `<span class="go">›</span></a>`;
}
function compChip(cp, all) {
  const p = all.find(x => x.id === cp.id);
  const av = p ? avatarP(p, "cav") : `<span class="cav">${esc((cp.name || "?").trim()[0])}</span>`;
  const href = (p && p.crew2026 && p.crew2026.link) || `#${cp.id}`;
  return `<a class="cchip" href="${href}">${av}<span class="cn">${esc(cp.name)}<small>${cp.trips} ${cp.trips === 1 ? "viaggio" : "viaggi"}</small></span></a>`;
}
function lbOne(src){ const lb=document.getElementById('lb'); lb.querySelector('img').src=src; lb.classList.add('on'); }
(function(){ const lb=document.getElementById('lb'); lb.querySelector('.x').onclick=()=>lb.classList.remove('on'); lb.onclick=e=>{ if(e.target!==lb.querySelector('.x')) lb.classList.remove('on'); }; document.addEventListener('keydown',e=>{ if(e.key==='Escape') lb.classList.remove('on'); }); })();
const day = s => new Date(s + "T12:00");
const fmt = s => day(s).toLocaleDateString("it", { day: "numeric", month: "long" });
const fmtS = s => day(s).toLocaleDateString("it", { day: "numeric", month: "short" });
const nights = m => Math.round((day(m.leave) - day(m.board)) / 864e5);
const roleLabel = r => r === "skipper" ? "Skipper" : r === "apprentice" ? "Aspirante skipper" : r === "marinaio" ? "Marinaio" : "Equipaggio";
const initial = m => (m.name || "?").trim()[0].toUpperCase();
const avatar = (m, cls) => m.photo
  ? `<img class="${cls}" src="${m.photo}" alt="${esc(m.name)}" loading="lazy">`
  : `<div class="${cls}">${initial(m)}</div>`;

// scheda dal questionario: ordine e etichette dei campi (mostrati se presenti)
const QFIELDS = [
  ["ruolo", "Ruolo a bordo"], ["esperienza", "Esperienza"], ["specialita", "Specialità"],
  ["dieta", "Dieta / allergie"], ["valigia", "Non può mancare"], ["motto", "Motto"], ["funfact", "Fun fact"],
];

// gradi navali (mostrine US Navy) per seniority = giorni in mare
const RANKC = { gold: "#C9A227", silver: "#AEB6BD", edge: "rgba(0,0,0,.35)" };
const RANK_LABEL = { admiral: "Ammiraglio", capt: "Capitano di vascello", cdr: "Capitano di fregata", ltcdr: "Capitano di corvetta", lt: "Tenente di vascello", ltjg: "Sottotenente di vascello", ensign: "Guardiamarina", recruit: "Allievo" };
function starPath(cx, cy, r) { let p = ""; for (let i = 0; i < 10; i++) { const a = -Math.PI / 2 + i * Math.PI / 5, rr = i % 2 ? r * 0.4 : r; p += (i ? "L" : "M") + (cx + rr * Math.cos(a)).toFixed(1) + " " + (cy + rr * Math.sin(a)).toFixed(1); } return p + "Z"; }
function rankSVG(r) {
  const G = RANKC.gold, S = RANKC.silver, E = RANKC.edge;
  const open = '<svg viewBox="0 0 44 24" class="ins">', bar = (x, c) => `<rect x="${x}" y="4.5" width="5.5" height="15" rx="2" fill="${c}" stroke="${E}" stroke-width=".6"/>`;
  const leaf = c => `<g transform="translate(22,12)"><path d="M0,-9 C3.2,-5 7,-4 5.6,0 C8,1.6 6.6,6 3,6.6 C3.6,9 0,9 0,9.6 C0,9 -3.6,9 -3,6.6 C-6.6,6 -8,1.6 -5.6,0 C-7,-4 -3.2,-5 0,-9 Z" fill="${c}" stroke="${E}" stroke-width=".6"/><path d="M0,-7 L0,8.6" stroke="${E}" stroke-width=".7" opacity=".45" fill="none"/></g>`;
  switch (r) {
    case "admiral": return open + [7, 18, 29, 40].map(x => `<path d="${starPath(x, 12, 4.4)}" fill="${G}" stroke="${E}" stroke-width=".4"/>`).join("") + "</svg>";
    case "capt": return open + `<g fill="${S}" stroke="${E}" stroke-width=".5"><path d="M22,10.6 C15,8 7,9.4 3,13 C10,12 16,12.6 22,13.6 C28,12.6 34,12 41,13 C37,9.4 29,8 22,10.6 Z"/><circle cx="22" cy="8.4" r="2"/><path d="M22,6.8 L24.2,8 L22,9.2 Z"/></g></svg>`;
    case "cdr": return open + leaf(S) + "</svg>";
    case "ltcdr": return open + leaf(G) + "</svg>";
    case "lt": return open + bar(16.2, S) + bar(23.2, S) + "</svg>";
    case "ltjg": return open + bar(19.7, S) + "</svg>";
    case "ensign": return open + bar(19.7, G) + "</svg>";
    default: return open + `<circle cx="22" cy="12" r="3.4" fill="none" stroke="${S}" stroke-width="1.5" opacity=".55"/></svg>`;
  }
}
const photoOf = m => (m.crew2026 && m.crew2026.photo) || m.photo || null;
const avatarP = (m, cls) => photoOf(m)
  ? `<img class="${cls}" src="${photoOf(m)}" alt="${esc(m.name)}" loading="lazy">`
  : `<div class="${cls}">${initial(m)}</div>`;
const rankBadge = m => `<span class="rankbadge">${rankSVG(m.rank)} <b>${esc(RANK_LABEL[m.rank] || "")}</b></span>`;

function memberPage(m, all) {
  const c = m.crew2026 || null;
  const roleTxt = m.pet ? "🐾 Cane di bordo" : (c ? roleLabel(c.role) : "Compagno di rotta");
  const yrs = m.first ? `${m.first}${m.last && m.last !== m.first ? "–" + m.last : ""}` : "";
  const vet = (m.trips || 0) > 0
    ? `<span class="badge vet">⚓ ${m.trips} crociere · ${m.days} giorni</span>`
    : `<span class="badge rookie">\U0001F31F prima volta a bordo</span>`;
  const others = all.filter(x => x.crew2026 && !x.crew2026.link && x.id !== m.id);
  const strip = others.map(x =>
    `<a href="#${x.id}" title="${esc(x.name)}">${avatarP(x, "av")}<small>${esc(x.name)}</small></a>`).join("");
  const note = c && c.note ? c.note : null;
  const q = (c && c.q) || {};
  const qrows = QFIELDS.filter(([k]) => q[k]).map(([k, lab]) =>
    `<div class="qrow"><b>${lab}</b><span>${esc(q[k])}</span></div>`).join("");
  const nn = c ? Math.round((day(c.leave) - day(c.board)) / 864e5) : 0;
  return `
  <div class="mhero">
    ${photoOf(m) ? `<img class="mphoto zoom" src="${photoOf(m)}" alt="${esc(m.name)}" onclick="lbOne('${photoOf(m)}')">` : avatarP(m, "mph-ph")}
    <div class="mhd">
      <div class="role">${esc(roleTxt)}</div>
      <h1>${esc(m.name)}</h1>
      ${(m.nicks && m.nicks.length) ? `<div class="nick">${m.sex === "f" ? "detta" : "detto"} ${m.nicks.map(n => `“${esc(n)}”`).join(", ")}</div>` : (c && c.nick ? `<div class="nick">${m.sex === "f" ? "detta" : "detto"} “${esc(c.nick)}”</div>` : "")}
      <div class="rankrow">${rankBadge(m)}</div>
      ${vet}
    </div>
  </div>
  <section>
    <div class="mstats">
      <div class="mstat"><b>${m.trips || 0}</b><i>crociere</i></div>
      <div class="mstat"><b>${nfmt(m.days)}</b><i>giorni in mare</i></div>
      <div class="mstat"><b>${nfmt(m.nm)}</b><i>miglia</i></div>
      <div class="mstat"><b>${yrs || "—"}</b><i>${m.trips > 0 ? "stagioni" : "esordio"}</i></div>
    </div>
    ${(m.tags && m.tags.length) ? `<div class="mtags">${m.tags.map(tg => `<span class="mtag">${esc(tg)}</span>`).join("")}</div>` : ""}
    ${m.bio ? `<h2>Ritratto di bordo</h2><div class="card bio"><span class="epithet">${esc(m.bio.epithet || "")}</span>${m.bio.html}</div>` : ""}
    ${(m.trips_list && m.trips_list.length) ? `<h2>⛵ I viaggi insieme</h2><div class="tlog">${m.trips_list.map(tripRow).join("")}</div>` : ""}
    ${(m.companions && m.companions.length) ? `<h2>🔗 Con chi ha navigato di più</h2><div class="cchips">${m.companions.map(cp => compChip(cp, all)).join("")}</div>` : ""}
    ${anecFor(m.id).length ? `<h2>📖 Aneddoti</h2><div class="tlog">${anecFor(m.id).map(anecRow).join("")}</div>` : ""}
    ${note ? `<h2>In breve</h2><div class="card note">${note}</div>` : ""}
    ${c ? `<h2>A bordo nel 2026</h2>
      <div class="card">Sale a Cannigione il <b>${fmt(c.board)}</b> e sbarca il <b>${fmt(c.leave)}</b> — <b>${nn} notti</b> di navigazione tra Corsica e Sardegna.</div>
      <h2>Scheda personale</h2>
      ${qrows ? `<div class="card">${qrows}</div>` : `<div class="q-empty">\U0001F9ED La scheda dal <b>questionario equipaggio</b> arriverà qui.<br><a href="https://form.jotform.com/261907242193053" target="_blank" rel="noopener">Compila il questionario ›</a></div>`}`
    : `<h2>Compagno di rotta</h2><div class="card">Ha condiviso <b>${m.trips} crociere</b>, <b>${nfmt(m.days)} giorni</b> e <b>${nfmt(m.nm)} miglia</b> di mare con l'Ammiraglio${yrs ? `, dal <b>${m.first}</b> al <b>${m.last}</b>` : ""}. Grado: <b>${esc(RANK_LABEL[m.rank] || "")}</b>.</div>`}
    ${(m.photos && m.photos.length) ? `<h2>📸 Foto</h2><div class="pgal">${m.photos.map(p =>
      `<figure onclick="lbOne('${p.src}')"><img src="${p.src}" alt="${esc(p.caption || m.name)}" loading="lazy"><figcaption><a href="viaggio.html#${p.trip_id}" onclick="event.stopPropagation()">${esc(p.caption || "")}${BOATNAME.get(p.trip_id) ? ` · «${esc(BOATNAME.get(p.trip_id))}»` : ""} ›</a></figcaption></figure>`).join("")}</div>` : ""}
    ${strip ? `<h2>La ciurma 2026</h2><div class="strip">${strip}</div>` : ""}
  </section>
  <footer><a class="pl" href="${c ? "arrivi.html" : "skipper.html"}">‹ ${c ? "Torna alla ciurma" : "Torna alla classifica"}</a></footer>`;
}

function directory(all) {
  const crew = all.filter(m => m.crew2026);
  const cards = crew.map(m => {
    const c = m.crew2026;
    const badge = (m.trips || 0) > 0 ? `<span class="vt">${m.trips}× · ${m.days} gg</span>` : `<span class="rk">prima volta</span>`;
    const href = c.link || `#${m.id}`;
    return `<a class="mcard" href="${href}">${avatarP(m, "ph")}<div class="b"><b>${esc(m.name)}</b><span>${esc(roleLabel(c.role))}</span><br>${badge}</div></a>`;
  }).join("");
  return `<div class="mhero"><div class="mhd"><div class="role">Equipaggio · Niña 2026</div>
    <h1>La ciurma</h1><div class="nick">Una scheda per ognuno: foto, giorni insieme, grado e — presto — i dati dal questionario.</div></div></div>
    <section><h2>I membri</h2><div class="grid">${cards}</div>
    <p style="margin-top:1rem;font-size:.85rem;color:var(--soft)">Vedi anche <a href="arrivi.html">arrivi &amp; partenze</a> e la <a href="skipper.html">classifica completa coi gradi</a>.</p></section>
    <footer><a class="pl" href="index.html">‹ Torna alla Plancia Niña</a></footer>`;
}

let DATA = [], BOATNAME = new Map(), ANEC = [];
function route() {
  const id = decodeURIComponent(location.hash.replace(/^#/, ""));
  const m = DATA.find(x => x.id === id);
  if (m && m.crew2026 && m.crew2026.link) { location.replace(m.crew2026.link); return; }
  document.getElementById("app").innerHTML = m ? memberPage(m, DATA) : directory(DATA);
  window.scrollTo(0, 0);
}
window.addEventListener("hashchange", route);
Promise.all([
  fetch("data/crew.json", { cache: "no-cache" }).then(r => r.json()),
  fetch("data/trips.json", { cache: "no-cache" }).then(r => r.json()).catch(() => ({ trips: [] })),
  fetch("data/anecdotes.json", { cache: "no-cache" }).then(r => r.json()).catch(() => ({ anecdotes: [] })),
]).then(([d, dt, da]) => {
  DATA = d.people || [];
  (dt.trips || []).forEach(t => BOATNAME.set(t.id, t.name));
  ANEC = da.anecdotes || [];
  route();
}).catch(() => { document.getElementById("app").innerHTML = `<section><p style="padding:2rem 0">Equipaggio non disponibile offline.</p></section>`; });
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
</script>
<script src="nav.js"></script>
</body>
</html>
