<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Le mete · Everywaves</title>
<meta name="description" content="Le mete di Everywaves: la mappa delle destinazioni fatte, da fare e proposte dalla ciurma.">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0A1424">
<script src="theme.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans+Condensed:wght@600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBFDFF; --sea-1:#EEF4F9; --sea-2:#D8E4EE; --panel:#FFFFFF;
  --ink:#0B1320; --soft:#3E556B; --hair:#C4D2DF; --accent:#006B9F; --gold:#B8860B; --gold-2:#E5C158; --verde:#0A7A43; --rosso:#C0392B;
  --display:"IBM Plex Sans Condensed",system-ui,sans-serif; --body:"IBM Plex Sans",system-ui,sans-serif; --mono:"IBM Plex Mono",ui-monospace,monospace;
}
@media (prefers-color-scheme: dark){:root{
  --paper:#070E1A; --sea-1:#101E33; --sea-2:#1C3552; --panel:#0C1728;
  --ink:#DCE7F5; --soft:#8299B4; --hair:#22384F; --accent:#35C4E7; --gold:#E5C158; --gold-2:#FBE7A8; --verde:#2FBF71; --rosso:#E2536F;
}}
*{box-sizing:border-box;margin:0}
body{background:var(--paper);color:var(--ink);font:400 16px/1.55 var(--body);-webkit-font-smoothing:antialiased}
main{max-width:820px;margin:0 auto;border-left:1px solid var(--hair);border-right:1px solid var(--hair);min-height:100vh}
.wrap{max-width:820px;margin:0 auto}
a{color:var(--accent)}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb, var(--paper) 88%, transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--hair)}
.top .wrap{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.1rem}
.back{font:700 .66rem/1 var(--display);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--soft)}
.top .tag{font:700 .66rem/1 var(--display);letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
section{padding:0 1.1rem 1.6rem}
h2{font:700 .74rem/1 var(--display);letter-spacing:.2em;text-transform:uppercase;color:var(--soft);
  margin:1.7rem 0 1rem;display:flex;align-items:center;gap:.55rem;border-left:3px solid var(--gold);padding-left:.55rem}
h2::after{content:"";flex:1;height:1px;background:var(--hair)}
/* hero */
.mhero{padding:1.6rem 1.1rem .2rem}
.mhero .yr{font:700 .62rem/1 var(--display);letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
.mhero h1{font:700 2.3rem/1.02 var(--display);letter-spacing:.01em;margin:.35rem 0 .3rem}
.mhero .sub{color:var(--soft);max-width:44rem}
.progress{display:flex;align-items:center;gap:.8rem;margin-top:1rem}
.progress .bar{flex:1;height:10px;background:var(--sea-2);border-radius:6px;overflow:hidden}
.progress .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--verde));border-radius:6px}
.progress .lab{font:700 .9rem/1 var(--mono);color:var(--ink);white-space:nowrap}
.progress .lab small{font:400 .56rem/1 var(--display);letter-spacing:.1em;text-transform:uppercase;color:var(--soft);display:block;text-align:right;margin-top:.2rem}
/* map */
.legend{display:flex;flex-wrap:wrap;gap:.9rem;margin-bottom:.8rem;font:600 .78rem/1 var(--body);color:var(--soft)}
.legend span{display:inline-flex;align-items:center;gap:.4rem}
.lg-dot{width:13px;height:13px;border-radius:50%;flex:none}
.lg-done{background:var(--accent)}
.lg-todo{background:transparent;border:2px solid var(--soft)}
.lg-next{background:var(--gold)}
.mapwrap{border:1px solid var(--hair);border-radius:10px;overflow:hidden;background:linear-gradient(180deg,var(--sea-1),var(--panel))}
svg.worldmap{display:block;width:100%;height:auto}
svg.worldmap .land{fill:var(--sea-2);stroke:var(--hair);stroke-width:.4}
svg.worldmap .grat{stroke:var(--hair);stroke-width:.4;opacity:.5;fill:none}
.pin{cursor:pointer;transition:opacity .15s}
.pin.done{fill:var(--accent);stroke:var(--panel);stroke-width:1.2}
.pin.todo{fill:var(--panel);stroke:var(--soft);stroke-width:1.4}
.pin.next{fill:var(--gold);stroke:var(--panel);stroke-width:1.2}
.pin.dim{opacity:.12}
.pin.sel{stroke:var(--ink);stroke-width:2}
.areachips{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.8rem}
.achip{font:700 .58rem/1 var(--display);letter-spacing:.06em;text-transform:uppercase;background:var(--panel);border:1px solid var(--hair);border-radius:99px;padding:.4rem .7rem;cursor:pointer;color:var(--soft);display:inline-flex;align-items:center;gap:.4rem}
.achip:hover{border-color:var(--accent);color:var(--accent)}
.achip.on{background:var(--sea-2);color:var(--ink);border-color:var(--accent)}
.achip .adot{width:9px;height:9px;border-radius:50%;flex:none}
.meta-panel{margin-top:.9rem;background:var(--panel);border:1px solid var(--hair);border-left:3px solid var(--accent);border-radius:8px;padding:.9rem 1rem}
.meta-panel.next{border-left-color:var(--gold)}
.meta-panel .mp-area{font:700 .56rem/1.2 var(--display);letter-spacing:.1em;text-transform:uppercase;color:var(--soft);display:flex;align-items:center;gap:.4rem}
.meta-panel h3{font:700 1.15rem/1.2 var(--body);margin:.25rem 0 .4rem}
.meta-panel .mp-status{display:inline-block;font:700 .56rem/1 var(--display);letter-spacing:.08em;text-transform:uppercase;border-radius:99px;padding:.3rem .6rem;margin-bottom:.5rem}
.mp-status.done{background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent)}
.mp-status.todo{background:var(--sea-2);color:var(--soft)}
.mp-status.next{background:color-mix(in srgb,var(--gold) 20%,transparent);color:var(--gold)}
.mp-trips{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.3rem}
.mp-trips a{font:600 .82rem/1 var(--body);text-decoration:none;color:inherit;background:var(--sea-1);border:1px solid var(--hair);border-radius:99px;padding:.35rem .7rem}
.mp-trips a:hover{border-color:var(--accent);color:var(--accent)}
/* checklist per area */
.acc{border:1px solid var(--hair);border-radius:9px;overflow:hidden;margin-bottom:.7rem;background:var(--panel)}
.acc>summary{list-style:none;cursor:pointer;padding:.8rem 1rem;display:flex;align-items:center;gap:.6rem;font:700 .8rem/1.1 var(--display);letter-spacing:.03em}
.acc>summary::-webkit-details-marker{display:none}
.acc>summary .adot{width:11px;height:11px;border-radius:50%;flex:none}
.acc>summary .cnt{margin-left:auto;font:700 .62rem/1 var(--mono);color:var(--soft)}
.acc>summary .chev{color:var(--soft);transition:transform .15s}
.acc[open]>summary .chev{transform:rotate(180deg)}
.mlist{padding:.2rem .7rem .7rem}
.mrow{display:flex;align-items:center;gap:.55rem;padding:.5rem .5rem;border-top:1px solid var(--hair);text-decoration:none;color:inherit;font-size:.92rem}
.mrow:first-child{border-top:0}
.mrow .mk{flex:none;width:1.3rem;text-align:center;font-weight:700}
.mrow.done .mk{color:var(--verde)} .mrow.todo .mk{color:var(--soft)}
.mrow.done{cursor:pointer}
.mrow.done:hover{color:var(--accent)}
.mrow .mn{flex:none;font:700 .72rem/1 var(--mono);color:var(--soft);width:1.7rem}
.mrow .mt{flex:1;min-width:0}
.mrow .go{color:var(--soft);font-weight:700}
.mrow.todo{opacity:.82}
/* nuovi viaggi */
.pintro{color:var(--soft);margin-bottom:1rem}
/* "Nuovi viaggi" in evidenza in cima alla pagina */
#nuovi-viaggi{margin:1.2rem 1.1rem 0;padding:1.1rem 1.1rem 1.4rem;background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 12%,var(--panel)),var(--panel));border:1px solid color-mix(in srgb,var(--gold) 38%,var(--hair));border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.06)}
#nuovi-viaggi h2{margin-top:.2rem;color:var(--gold)}
.banner{background:var(--sea-1);border:1px dashed var(--hair);border-radius:8px;padding:1rem;color:var(--soft);font-size:.9rem;margin-bottom:1rem}
.banner b{color:var(--ink)}
.pcards{display:grid;grid-template-columns:1fr;gap:.9rem}
@media(min-width:620px){.pcards{grid-template-columns:1fr 1fr}}
.pcard{background:var(--panel);border:1px solid var(--hair);border-left:3px solid var(--gold);border-radius:10px;padding:1rem 1.05rem;display:flex;flex-direction:column}
.pcard .pwhen{font:700 .56rem/1 var(--display);letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
.pcard h3{font:700 1.2rem/1.15 var(--body);margin:.35rem 0 .2rem}
.pcard .parea{font:700 .54rem/1 var(--display);letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
.pcard .pblurb{color:var(--soft);font-size:.92rem;margin:.55rem 0 .8rem;flex:1}
.pcard .pfoot{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap}
.pcard .pcount{font:700 1.35rem/1 var(--mono);color:var(--ink)}
.pcard .pcount small{font:400 .54rem/1 var(--display);letter-spacing:.08em;text-transform:uppercase;color:var(--soft);display:block;margin-top:.15rem}
.btn{display:inline-flex;align-items:center;gap:.4rem;margin-left:auto;font:700 .66rem/1 var(--display);letter-spacing:.08em;text-transform:uppercase;text-decoration:none;color:#fff;background:var(--accent);border-radius:99px;padding:.6rem .95rem}
.btn.ghost{color:var(--soft);background:transparent;border:1px solid var(--hair)}
.btn:hover{filter:brightness(1.06)}
footer{display:block;padding:1.8rem 1.1rem 3rem;text-align:center;color:var(--soft);font-size:.85rem}
footer a.pl{display:inline-block;margin-top:1rem;font:700 .66rem/1 var(--display);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--soft);border:1px solid var(--hair);padding:.6rem 1rem;border-radius:99px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

   PREFILL_ENTRY = (opz.) id campo Google per preselezionare la proposta (es. "entry.123456") */
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdCyyAwMS04as8jTyBZDvK7tYTBIvI4bRHSRyUOSV_u3bJggQ/viewform";
const SHEET_CSV_URL = "";
const CSV_TRIP_COL = "";

const esc = s => String(s ?? "").replace(/[<>&"]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" }[c]));

// proiezione equirettangolare — IDENTICA a scripts/convert.py della basemap
const PROJ = { W: 1000, H: 417, latTop: 84, latBot: -66 };
function proj(lat, lon) {
  return {
    x: +(((lon + 180) / 360) * PROJ.W).toFixed(1),
    y: +(((PROJ.latTop - lat) / (PROJ.latTop - PROJ.latBot)) * PROJ.H).toFixed(1),
  };
}

let METE = [], AREAS = [], PROPOSTE = [], TRIPS = new Map(), AREA_OF = {}, COUNTS = null, activeArea = null;

function tripLabel(id) {
  const t = TRIPS.get(id);
  if (!t) return "il viaggio";
  const zone = (t.zone || t.country || "").replace(/\s*-\s*[A-Z]{2}\s*$/i, "");
  return `${t.name ? "«" + t.name + "» " : ""}${zone ? "· " + zone : ""}${t.year ? " " + t.year : ""}`.trim();
}

/* ---------- mappa ---------- */
function pinsMarkup() {
  const dots = [];
  METE.forEach(m => {
    const p = proj(m.lat, m.lon);
    dots.push(`<circle class="pin ${m.done ? "done" : "todo"} a-${m.area}" cx="${p.x}" cy="${p.y}" r="${m.done ? 5 : 3.6}" data-id="${m.id}" data-kind="meta"><title>${esc(m.name)}${m.done ? " ✓" : ""}</title></circle>`);
  });
  PROPOSTE.forEach(p => {
    if (p.lat == null || p.lon == null) return;
    const q = proj(p.lat, p.lon);
    dots.push(`<circle class="pin next" cx="${q.x}" cy="${q.y}" r="6" data-id="${p.id}" data-kind="proposta"><title>${esc(p.title)}</title></circle>`);
  });
  return dots.join("");
}

function showMeta(id, kind) {
  const panel = document.getElementById("meta-panel");
  document.querySelectorAll(".pin.sel").forEach(el => el.classList.remove("sel"));
  const pin = document.querySelector(`.pin[data-id="${CSS.escape(id)}"]`);
  if (pin) pin.classList.add("sel");
  if (kind === "proposta") {
    const p = PROPOSTE.find(x => x.id === id);
    if (!p) return;
    const cnt = COUNTS ? (COUNTS[p.id] || 0) : null;
    panel.className = "meta-panel next";
    panel.innerHTML = `<div class="mp-area"><span class="adot" style="background:var(--gold)"></span>${esc(p.area || "Prossima meta")} · ${esc(p.when || "")}</div>
      <h3>${esc(p.title)}</h3>
      <span class="mp-status next">Prossimo viaggio${cnt != null ? " · " + cnt + " interessati" : ""}</span>
      <p style="color:var(--soft);font-size:.92rem">${esc(p.blurb || "")}</p>
      <a class="btn" href="#nuovi-viaggi">Vedi le proposte ↓</a>`;
    panel.hidden = false;
    return;
  }
  const m = METE.find(x => x.id === id);
  if (!m) return;
  const area = AREA_OF[m.area];
  const trips = (m.trip_ids || []).map(t => `<a href="viaggio.html#${t}">${esc(tripLabel(t))} ›</a>`).join("");
  panel.className = "meta-panel";
  panel.innerHTML = `<div class="mp-area"><span class="adot" style="background:${area ? area.color : "var(--soft)"}"></span>${esc(area ? area.name : "")}</div>
    <h3>${m.n}. ${esc(m.name)}</h3>
    <span class="mp-status ${m.done ? "done" : "todo"}">${m.done ? "✓ Meta fatta" : "○ Ancora da fare"}</span>
    ${m.done && trips ? `<div class="mp-trips">${trips}</div>` : ""}
    ${!m.done ? `<p style="color:var(--soft);font-size:.92rem">Non ancora nel registro di bordo. Una meta per il futuro.</p>` : ""}`;
  panel.hidden = false;
}

function filterArea(area) {
  activeArea = (activeArea === area) ? null : area;
  document.querySelectorAll(".achip").forEach(c => c.classList.toggle("on", c.dataset.area === activeArea));
  document.querySelectorAll(".pin").forEach(pin => {
    if (pin.classList.contains("next")) { pin.classList.toggle("dim", !!activeArea); return; }
    const inArea = pin.classList.contains("a-" + activeArea);
    pin.classList.toggle("dim", !!activeArea && !inArea);
  });
}

function checklistHTML() {
  return AREAS.map(a => {
    const items = METE.filter(m => m.area === a.id);
    const done = items.filter(m => m.done).length;
    const rows = items.map(m => {
      if (m.done) {
        const href = (m.trip_ids && m.trip_ids[0]) ? `viaggio.html#${m.trip_ids[0]}` : "#";
        return `<a class="mrow done" href="${href}"><span class="mk">✓</span><span class="mn">${m.n}</span><span class="mt">${esc(m.name)}</span><span class="go">›</span></a>`;
      }
      return `<div class="mrow todo"><span class="mk">○</span><span class="mn">${m.n}</span><span class="mt">${esc(m.name)}</span></div>`;
    }).join("");
    return `<details class="acc"${done ? " open" : ""}><summary><span class="adot" style="background:${a.color}"></span>${esc(a.name)}<span class="cnt">${done}/${items.length}</span><span class="chev">▾</span></summary>
      <div class="mlist">${rows}</div></details>`;
  }).join("");
}

/* ---------- nuovi viaggi ---------- */
function formLink(p) {
  if (!FORM_URL) return "";
  if (PREFILL_ENTRY) {
    const sep = FORM_URL.includes("?") ? "&" : "?";
    return `${FORM_URL}${sep}usp=pp_url&${encodeURIComponent(PREFILL_ENTRY)}=${encodeURIComponent(p.title)}`;
  }
  return FORM_URL;
}
function proposteHTML() {
  const cards = PROPOSTE.map(p => {
    const cnt = COUNTS ? (COUNTS[p.id] || 0) : null;
    const btn = FORM_URL
      ? `<a class="btn" href="${esc(formLink(p))}" target="_blank" rel="noopener">Sono interessato ›</a>`
      : `<span class="btn ghost">Adesioni in arrivo</span>`;
    return `<div class="pcard" id="prop-${p.id}">
      <div class="pwhen">${esc(p.when || "")}</div>
      <h3>${esc(p.title)}</h3>
      <div class="parea">${esc(p.area || "")}</div>
      <p class="pblurb">${esc(p.blurb || "")}</p>
      <div class="pfoot">
        <div class="pcount">${cnt != null ? cnt : "—"}<small>interessati</small></div>
        ${btn}
      </div></div>`;
  }).join("");
  const banner = !FORM_URL
    ? `<div class="banner">📝 <b>Adesioni in allestimento.</b> Il modulo di adesione e il contatore live arrivano appena colleghiamo il Google Form. Intanto, ecco le mete in cantiere.</div>`
    : "";
  return `<section id="nuovi-viaggi"><h2>Nuovi viaggi</h2>
    <p class="pintro">Le prossime avventure in cantiere. Se ti interessa una meta, fai un fischio: quando siamo abbastanza, si parte.</p>
    ${banner}
    <div class="pcards">${cards}</div></section>`;
}

/* ---------- CSV (conteggio interessati dal foglio Google) ---------- */
function parseCSV(text) {
  const rows = []; let row = [], cur = "", q = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (q) {
      if (ch === '"') { if (text[i + 1] === '"') { cur += '"'; i++; } else q = false; }
      else cur += ch;
    } else if (ch === '"') q = true;
    else if (ch === ",") { row.push(cur); cur = ""; }
    else if (ch === "\n") { row.push(cur); rows.push(row); row = []; cur = ""; }
    else if (ch === "\r") { /* skip */ }
    else cur += ch;
  }
  if (cur.length || row.length) { row.push(cur); rows.push(row); }
  return rows;
}
function countFromCSV(text) {
  const rows = parseCSV(text).filter(r => r.length && r.some(c => c.trim() !== ""));
  if (rows.length < 2) return {};
  const header = rows[0].map(h => h.trim());
  let col = CSV_TRIP_COL ? header.findIndex(h => h.toLowerCase() === CSV_TRIP_COL.toLowerCase()) : -1;
  if (col < 0) col = header.findIndex(h => /viagg|propost|interess|meta/i.test(h));
  const out = {};
  PROPOSTE.forEach(p => out[p.id] = 0);
  rows.slice(1).forEach(r => {
    const cell = (col >= 0 ? (r[col] || "") : r.join(" ")).toLowerCase();
    PROPOSTE.forEach(p => {
      if (cell.includes(p.title.toLowerCase()) || cell.includes(p.id.toLowerCase())) out[p.id]++;
    });
  });
  return out;
}

/* ---------- render ---------- */
function render() {
  const doneN = METE.filter(m => m.done).length, tot = METE.length;
  const pct = Math.round(doneN / tot * 100);
  const chips = AREAS.map(a => `<button class="achip" data-area="${a.id}" onclick="filterArea('${a.id}')"><span class="adot" style="background:${a.color}"></span>${esc(a.name)}</button>`).join("");
  document.getElementById("app").innerHTML = `
    <div class="mhero"><div class="yr">Registro di bordo · mete</div>
      <h1>Le mete</h1>
      <div class="sub">La bucket-list velica del comandante: dove la Niña (e le barche prima di lei) è già stata, e dove punta la prua. Tocca un puntino sulla mappa o scorri la checklist.</div>
      <div class="progress"><div class="bar"><i style="width:${pct}%"></i></div>
        <div class="lab">${doneN}/${tot}<small>mete fatte</small></div></div>
    </div>
    ${proposteHTML()}
    <section>
      <h2>La mappa delle mete</h2>
      <div class="legend">
        <span><span class="lg-dot lg-done"></span>Fatte</span>
        <span><span class="lg-dot lg-todo"></span>Da fare</span>
        <span><span class="lg-dot lg-next"></span>Prossime</span>
      </div>
      <div class="mapwrap">${mapSVG()}</div>
      <div id="meta-panel" class="meta-panel" hidden></div>
      <div class="areachips">${chips}</div>
    </section>
    <section><h2>Il check delle mete</h2>${checklistHTML()}</section>
    <footer><a class="pl" href="index.html">‹ Torna alla Plancia Niña</a></footer>`;

  // click delegato sui pin
  const svg = document.querySelector("svg.worldmap");
  if (svg) svg.addEventListener("click", e => {
    const c = e.target.closest(".pin");
    if (!c) return;
    showMeta(c.dataset.id, c.dataset.kind);
    document.getElementById("meta-panel").scrollIntoView({ behavior: "smooth", block: "nearest" });
  });
}

Promise.all([
  fetch("data/mete.json", { cache: "no-cache" }).then(r => r.json()),
  fetch("data/proposte.json", { cache: "no-cache" }).then(r => r.json()).catch(() => ({ proposte: [] })),
  fetch("data/trips.json", { cache: "no-cache" }).then(r => r.json()).catch(() => ({ trips: [] })),
]).then(([dm, dp, dt]) => {
  METE = dm.mete || []; AREAS = dm.areas || [];
  AREAS.forEach(a => AREA_OF[a.id] = a);
  PROPOSTE = dp.proposte || [];
  (dt.trips || []).forEach(t => TRIPS.set(t.id, t));
  render();
  // conteggio adesioni: da data/proposte_counts.json (generato leggendo il Google Form via API,
  // connettore Drive). Fallback al CSV se SHEET_CSV_URL è impostato.
  fetch("data/proposte_counts.json", { cache: "no-cache" }).then(r => r.ok ? r.json() : null).then(d => {
    if (d && d.counts) { COUNTS = d.counts; render(); return; }
    if (SHEET_CSV_URL) return fetch(SHEET_CSV_URL, { cache: "no-cache" }).then(r => r.text()).then(txt => { COUNTS = countFromCSV(txt); render(); });
  }).catch(() => {});
}).catch(() => { document.getElementById("app").innerHTML = `<section><p style="padding:2rem 0">Mete non disponibili offline.</p></section>`; });
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
